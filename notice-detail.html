<!DOCTYPE html>
<html lang="ko" data-section="util">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지사항 — 리딩수학과학</title>
  <link rel="stylesheet" href="styles/tokens.css?v=17" />
  <link rel="stylesheet" href="styles/base.css?v=4" />
  <link rel="stylesheet" href="styles/gnb.css?v=4" />
  <link rel="stylesheet" href="styles/util.css?v=5" />
  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; }
  </style>
</head>
<body class="u-body">
  <div class="u-app">
    <header class="gnb">
      <div class="gnb__info"><span class="gnb__logo"></span><span class="gnb__name">김학생</span></div>
      <div class="gnb__icons">
        <button class="gnb__ico" title="도움말"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.3c-.8.4-1 .9-1 1.7" stroke-linecap="round"/><circle cx="12" cy="16.5" r="1" fill="currentColor" stroke="none"/></svg></button>
        <button class="gnb__ico" title="오류 신고"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17h.01"/></svg></button>
        <button class="gnb__ico" id="noticeBtn" title="공지사항"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M4 9v6h3l7 4V5L7 9H4zM18 8a5 5 0 0 1 0 8"/></svg><span class="gnb__dot"></span></button>
        <button class="gnb__ico" id="menuBtn" title="메뉴"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
      </div>
    </header>

    <main class="u-main">
      <div class="u-wrap u-wrap--narrow">
        <div class="u-crumb"><a href="notice.html">공지사항</a>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span id="crumbCat">공지</span></div>

        <div class="u-card">
          <div class="u-card__pad">
            <div class="u-doc__meta">
              <span class="u-tag" id="docCat">공지</span>
              <span class="u-doc__title" id="docTitle">제목</span>
              <span class="u-doc__date" id="docDate">2026-00-00</span>
            </div>
            <div class="u-doc__body" id="docBody"></div>
            <div class="u-doc__file" id="docFile" style="display:none">
              <span style="font-size:13.5px;font-weight:700;color:var(--ink-2)">첨부파일</span>
              <a href="#" onclick="return false"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v5h5"/><path d="M6 3h8l5 5v11a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/></svg><span id="docFileNm">첨부</span></a>
            </div>
          </div>
        </div>

        <div class="u-doc__foot">
          <a class="u-btn" href="notice.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>목록으로</a>
          <div style="display:flex;gap:9px">
            <button class="u-btn u-btn--sm" id="prevBtn">이전 글</button>
            <button class="u-btn u-btn--sm" id="nextBtn">다음 글</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="u-toast" id="toast"></div>

  <script>
  (function(){
    var CATCLASS = { '공지':'u-tag--blue', '이벤트':'u-tag--amber' };
    var DOCS = {
      8:{ cat:'공지', title:'시험 대비(유형 도전) 기능 오픈 안내', date:'2026-04-15', body:
        '<h3>📘 적용 범위 안내</h3>'
        +'<ul><li>적용 과목: 리딩수학 · 리딩과학</li><li>적용 학기: 중등 1-1학기, 2-1학기, 3-1학기</li><li>적용 단원: 각 학기 1~2단원</li></ul>'
        +'<p>※ 이후 단원 및 학기는 순차적으로 확대 적용 예정이며, 중등 1-1학기는 현재 문제 등록 중이에요.</p>'
        +'<h3>🚀 오픈 안내</h3>'
        +'<p>학생의 학습 상태에 맞춰 문제를 선택하고 연습할 수 있는 <b>시험 대비(유형 도전)</b> 기능이 새롭게 오픈되었어요. 필요한 유형을 선택해 반복 학습하며 시험을 효율적으로 준비할 수 있어요.</p>'
        +'<h3>📌 주요 기능 안내</h3>'
        +'<ul><li>시험대비 홈에서 학년·학기·교재 기준으로 문제 유형을 선택할 수 있어요.</li><li>성취도 색상 기준으로 유형을 구분하고 필요한 수준의 문제를 선택할 수 있어요.</li><li>중요 유형만 선택해 집중 학습할 수 있어요.</li></ul>' },
      7:{ cat:'이벤트', title:'[공지] 2026 학습 후기 이벤트 결과 발표 🎉 축하드립니다!', date:'2026-05-18', file:'이벤트 당첨자 발표.pdf', body:
        '<p>많은 참여 감사드립니다! 2026 학습 후기 이벤트 당첨자를 발표합니다.</p>'
        +'<h3>🏆 당첨자 안내</h3>'
        +'<ul><li>갓생기록상 (애플 에어팟4) : 1명 — 변*윤(3658)</li><li>뇌근육 벌크업상 (스탠리퀜처 텀블러) : 5명</li><li>문해력 바이브상 (싸이플렉스 세트) : 30명</li></ul>'
        +'<p>경품은 주소 확인이 완료되는 대로 금주 중 택배로 안전하게 발송됩니다. 등록된 휴대번호로 기프티콘이 일괄 발송됩니다.</p>'
        +'<p>기쁜 축하 인사를 나눠 주세요! 아쉽게 이번에 선정되지 못했더라도 다음 이벤트의 주인공이 될 수 있으니 실망하지 마시고 열공 모드를 유지해 보세요 ^^</p>' },
      6:{ cat:'공지', title:'자유 모드 · 계통별 학습 업데이트 안내', date:'2026-03-30', body:
        '<p>자유 모드에 <b>계통별 보기</b>가 추가되었어요. 학기 순서가 아니라 수와 연산·도형·측정 같은 계통(영역)을 따라 학습 흐름을 이어갈 수 있어요.</p>'
        +'<p>모두보기 화면에서 계통별로 대단원을 한눈에 확인하고 원하는 단원으로 바로 이동할 수 있습니다.</p>' },
      5:{ cat:'공지', title:'6월 정기 점검 안내 (6/12 새벽 2시~4시)', date:'2026-06-05', body:
        '<p>보다 안정적인 서비스 제공을 위해 아래 일정으로 정기 점검을 진행합니다.</p>'
        +'<ul><li>점검 일시: 2026년 6월 12일(금) 02:00 ~ 04:00</li><li>점검 내용: 서버 안정화 및 기능 개선</li></ul>'
        +'<p>점검 시간 동안 서비스 이용이 일시 중단됩니다. 이용에 참고 부탁드립니다.</p>' },
      4:{ cat:'이벤트', title:'갓생기록상 · 뇌근육 벌크업상 응모 안내', date:'2026-05-02', body:'<p>학습 후기 이벤트 응모가 시작되었어요. 자세한 내용은 이벤트 페이지를 확인해 주세요.</p>' },
      3:{ cat:'공지', title:'월간보고서 리포트 개편 안내', date:'2026-04-01', body:'<p>월간보고서가 학습 시간·정답률·성취도 중심으로 개편되었어요. 한 달의 학습을 더 쉽게 돌아볼 수 있습니다.</p>' },
      2:{ cat:'공지', title:'개인정보 처리방침 개정 안내', date:'2026-02-20', body:'<p>개인정보 처리방침이 일부 개정되었습니다. 자세한 내용은 하단 약관 페이지에서 확인하실 수 있습니다.</p>' },
      1:{ cat:'이벤트', title:'신규 가입 웰컴 이벤트', date:'2026-02-01', body:'<p>신규 가입을 환영합니다! 첫 학습을 완료하면 웰컴 뱃지를 드려요.</p>' }
    };
    var ORDER=[8,7,6,5,4,3,2,1];
    var id=parseInt(new URLSearchParams(location.search).get('id')||'8',10);
    if(!DOCS[id]) id=8;

    function show(id){
      var d=DOCS[id];
      document.getElementById('docCat').textContent=d.cat;
      document.getElementById('docCat').className='u-tag '+(CATCLASS[d.cat]||'');
      document.getElementById('crumbCat').textContent=d.cat;
      document.getElementById('docTitle').textContent=d.title;
      document.getElementById('docDate').textContent=d.date;
      document.getElementById('docBody').innerHTML=d.body;
      var f=document.getElementById('docFile');
      if(d.file){ f.style.display='flex'; document.getElementById('docFileNm').textContent=d.file; } else f.style.display='none';
      var pos=ORDER.indexOf(id);
      var pb=document.getElementById('prevBtn'), nb=document.getElementById('nextBtn');
      pb.disabled = pos>=ORDER.length-1; nb.disabled = pos<=0;
      pb.onclick=function(){ if(pos<ORDER.length-1){ id=ORDER[pos+1]; history.replaceState(null,'','?id='+id); show(id); document.querySelector('.u-main').scrollTop=0; } };
      nb.onclick=function(){ if(pos>0){ id=ORDER[pos-1]; history.replaceState(null,'','?id='+id); show(id); document.querySelector('.u-main').scrollTop=0; } };
    }
    show(id);
  })();
  </script>
  <script src="scripts/gnb-drawer.js?v=6"></script>
</body>
</html>
