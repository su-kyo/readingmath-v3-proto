<!DOCTYPE html>
<html lang="ko" data-theme="light" data-section="assign">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과제 풀이 — 리딩수학과학</title>
  <script>try{if(localStorage.getItem('rm-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
  <link rel="stylesheet" href="styles/tokens.css?v=18" />
  <style>
    /* =========================================================================
       과제 센터 · 풀이 화면 (assignment-solve) — 우주 셸
       · 블루 헤더 + 스페이스 배경 + 하단 콘솔바 (learn-world)
       · 좌: 문제 / 우: 답안표 OMR(현재=노랑테, 완료=파랑, 미풀이=점선) · 15문항
       · 객관식/주관식(키패드) 혼합, 라이트·다크 토글
       ========================================================================= */
    :root {
      --hd: var(--th-static); --blue: var(--th-accent); --blue-d: var(--blue-500); --yellow: var(--current);
      /* 라이트 표면 — content 거터(살짝틴트) → qpanel 흰색 / omr 살짝틴트 */
      --content: var(--n-000); --qpanel: var(--n-000); --panel: var(--n-050); --ink: var(--n-650); --sub: var(--text-muted);
      --line: var(--n-200); --opt: var(--n-000); --opt-hover: var(--n-050); --track: var(--n-100); --dash: var(--n-200);
    }
    :root[data-theme="dark"] {
      /* 다크 표면 — 뉴트럴 램프 단조증가(bg n-900 < 패널 n-800 < 카드 n-600)로 대비 확보 */
      --content: var(--n-900); --qpanel: var(--n-800); --panel: var(--n-800); --ink: var(--n-050); --sub: var(--text-muted);
      --line: var(--border-strong); --opt: var(--n-600); --opt-hover: var(--n-500); --track: var(--n-900); --dash: var(--n-500);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { font-family: var(--font-sans); background: var(--assign-body); overflow: hidden; -webkit-font-smoothing: antialiased; }

    .screen { position: relative; width: 100%; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .screen__bg { position: absolute; inset: 0; z-index: 0; background: url("assets/figma/bg-spaceship-task.png") center/cover no-repeat; }
    :root[data-theme="dark"] .screen__bg::after { content: ""; position: absolute; inset: 0; background: rgba(4,10,30,.45); }
    .wrap { position: relative; z-index: 1; flex: 1; min-height: 0; display: flex; flex-direction: column; padding: clamp(16px,2.4vw,30px) clamp(20px,5vw,72px) 0; gap: 14px; }

    /* ===== 헤더 ===== */
    .hd { flex: none; display: flex; align-items: center; justify-content: space-between; gap: 16px; background: var(--hd); border-radius: 30px; padding: 9px 12px 9px 28px; color: var(--n-000); }
    .bc { display: flex; align-items: center; gap: 8px; min-width: 0; font-size: 14px; }
    .bc__strong { font-weight: 800; letter-spacing: -.02em; white-space: nowrap; }
    .bc__unit { font-weight: 800; }
    .bc__t { opacity: .92; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bc__sep { opacity: .5; flex: none; }
    .hd__acts { display: flex; align-items: center; gap: 8px; flex: none; }
    .toggle { width: 62px; height: 32px; border-radius: 999px; background: rgba(0,0,0,.28); border: 0; position: relative; cursor: pointer; padding: 0; }
    .toggle__k { position: absolute; top: 2px; left: 2px; width: 28px; height: 28px; border-radius: 50%; background: center/contain no-repeat url("assets/figma/icons/ico-sun.svg"); transition: left .2s ease; }
    :root[data-theme="dark"] .toggle__k { left: 32px; background-image: url("assets/figma/icons/ico-moon.svg"); }
    .hd__ico { width: 34px; height: 34px; border: 0; border-radius: 11px; background: rgba(255,255,255,.14); color: var(--n-000); display: grid; place-items: center; cursor: pointer; transition: .14s; }
    .hd__ico:hover { background: rgba(255,255,255,.26); }
    .hd__ico svg, .hd__ico img { width: 19px; height: 19px; }

    /* ===== 콘텐츠 (2단) ===== */
    /* 프레임 테두리 = 헤더색(정적) · 다크·라이트 불변 */
    .content { flex: 1; min-height: 0; display: flex; gap: 14px; background: var(--content); border: 6px solid var(--th-static); border-bottom: 0; border-radius: 34px 34px 0 0; padding: 8px 8px 0; }
    .qpanel { background: var(--qpanel); border-radius: 30px 30px 0 0; }
    .omr { background: var(--panel); border-radius: 30px 30px 0 0; }
    .qpanel { flex: 1; min-width: 0; overflow-y: auto; padding: 26px 30px 120px; display: flex; flex-direction: column; gap: 16px; }
    .omr { width: 348px; flex: none; display: flex; flex-direction: column; gap: 16px; padding: 22px 22px 120px; }

    /* 문제 메타 */
    .qmeta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .qmeta__n { padding: 4px 10px; border-radius: 8px; background: var(--hd); color: var(--n-000); font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .qmeta__type { font-size: 15px; font-weight: 700; color: var(--hd); letter-spacing: -.01em; }
    :root[data-theme="dark"] .qmeta__type { color: var(--th-accent-hi); }
    .lvl { padding: 3px 10px; border-radius: 999px; font-size: 12.5px; font-weight: 800; margin-left: auto; }
    .lvl--기본 { background: color-mix(in srgb, var(--info-solid) 18%, transparent); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--info-solid) 42%, transparent); color: var(--info-ink); }
    .lvl--실력 { background: color-mix(in srgb, var(--th-accent) 18%, transparent); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--th-accent) 42%, transparent); color: var(--th-ink-accent); }
    .lvl--심화 { background: color-mix(in srgb, var(--warn-solid) 18%, transparent); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--warn-solid) 42%, transparent); color: var(--warn-ink); }

    .qtext { font-size: clamp(17px,1.5vw,20px); font-weight: 700; line-height: 1.65; letter-spacing: -.02em; color: var(--ink); }

    /* 이미지(산점도 등) */
    .qimg { align-self: center; padding: 14px; border-radius: 16px; background: var(--opt); border: 1px solid var(--line); }
    .qimg svg { display: block; width: 320px; height: 214px; max-width: 100%; }

    /* 객관식 */
    .opts { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .opts--col { grid-template-columns: 1fr; }
    .opt { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1.5px solid var(--line); border-radius: 14px; background: var(--opt); cursor: pointer; text-align: left; font-family: inherit; transition: border-color .13s, background .13s; }
    .opt:hover { border-color: var(--th-accent-hi); background: var(--opt-hover); }
    .opt.is-sel { border-color: var(--blue); background: color-mix(in srgb, var(--th-accent) 15%, transparent); box-shadow: inset 0 0 0 1px var(--blue); }
    .opt__n { width: 26px; height: 26px; flex: none; border-radius: 50%; border: 1.6px solid var(--dash); color: var(--sub); display: grid; place-items: center; font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .opt.is-sel .opt__n { border-color: var(--blue); background: var(--blue); color: var(--n-000); }
    .opt__t { font-size: 16px; font-weight: 600; color: var(--ink); }

    /* 주관식 (입력 + 키패드) */
    .short { display: flex; flex-direction: column; gap: 16px; align-items: center; }
    .short__field { display: inline-flex; align-items: center; gap: 8px; min-width: 260px; justify-content: center; padding: 12px 24px; border: 2px solid var(--current); border-radius: 14px; background: var(--opt); }
    .short__val { font-family: var(--font-mono); font-size: 22px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; min-width: 1ch; }
    .short__val:empty::before { content: "답을 입력해주세요"; font-family: var(--font-sans); font-size: 16px; font-weight: 500; color: var(--sub); opacity: .7; }
    .short__unit { font-size: 16px; font-weight: 700; color: var(--sub); }
    .keypad { display: grid; grid-template-columns: repeat(4, 56px); gap: 8px; }
    .kp { height: 48px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface-3); color: var(--text); font-family: var(--font-mono); font-size: 20px; font-weight: 700; cursor: pointer; transition: .1s; display: grid; place-items: center; }
    .kp:hover { background: var(--opt-hover); }
    .kp:active { transform: translateY(1px); }
    .kp--fn { color: var(--th-accent); background: var(--th-tint); }
    .kp svg { width: 20px; height: 20px; }

    /* ===== OMR 사이드바 ===== */
    .seg { flex: none; display: flex; gap: 3px; padding: 3px; background: var(--n-200); border-radius: 999px; }
    :root[data-theme="dark"] .seg { background: var(--n-500); }
    .seg__btn { flex: 1; padding: 9px 8px; border: 0; background: transparent; border-radius: 999px; font-family: inherit; font-size: 15px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: .14s; }
    /* is-active는 accent 배경 위 흰 글자로 고정(라이트·다크 공통). 다크 규칙이 active까지 덮지 않게 :not */
    :root[data-theme="dark"] .seg__btn:not(.is-active) { color: var(--text-muted); }
    .seg__btn.is-active { background: var(--th-accent); color: var(--n-000); }
    .omr__prog { display: flex; flex-direction: column; gap: 8px; }
    .omr__ptop { display: flex; align-items: center; justify-content: space-between; }
    .omr__ptop b { font-size: 16px; font-weight: 700; color: var(--ink); }
    .omr__ptop span { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
    .omr__track { height: 12px; border-radius: 999px; background: var(--track); padding: 2px; }
    .omr__track > i { display: block; height: 100%; border-radius: 999px; background: var(--blue); transition: width .25s ease; }
    .omr__grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .cell { aspect-ratio: 1; border: 2px dashed var(--dash); border-radius: 10px; background: transparent; color: var(--dash); font-family: var(--font-mono); font-size: 19px; font-weight: 700; cursor: pointer; font-variant-numeric: tabular-nums; transition: .12s; display: grid; place-items: center; }
    .cell:hover { border-color: var(--blue); color: var(--blue); }
    .cell.is-done { border: 2px solid var(--blue); background: var(--blue); color: var(--n-000); }
    .cell.is-cur { border: 3px solid var(--current); }
    .cell.is-cur.is-done { background: var(--blue); color: var(--n-000); }
    .cell.is-cur:not(.is-done) { color: var(--ink); border-style: solid; }

    /* ===== 답안표 입력 오버레이 ===== */
    .sheet-backdrop { position: fixed; inset: 0; z-index: 30; background: rgba(8,14,30,.42); opacity: 0; visibility: hidden; transition: .28s; }
    .sheet-backdrop.is-open { opacity: 1; visibility: visible; }
    .sheet { position: fixed; top: 0; right: 0; height: 100dvh; width: 600px; max-width: 94vw; z-index: 31; background: var(--surface-1); border-radius: 34px 0 0 34px; box-shadow: -6px 0 60px rgba(0,0,0,.28); transform: translateX(101%); transition: transform .3s cubic-bezier(.3,.8,.3,1); display: flex; flex-direction: column; }
    .sheet.is-open { transform: none; }
    :root[data-theme="dark"] .sheet { background: var(--n-650); }
    .sheet__head { position: relative; flex: none; padding: 24px 28px 16px; }
    .sheet__ttl { font-size: 18px; font-weight: 800; color: var(--th-ink-accent); letter-spacing: -.02em; }
    :root[data-theme="dark"] .sheet__ttl { color: var(--th-accent-hi); }
    .sheet__sub { margin: 8px 0 0; font-size: 14px; color: var(--sub); line-height: 1.55; max-width: 44ch; }
    .sheet__sub b { color: var(--th-ink-accent); font-weight: 700; }
    :root[data-theme="dark"] .sheet__sub b { color: var(--th-accent-hi); }
    .sheet__x { position: absolute; top: 18px; right: 20px; width: 34px; height: 34px; border: 0; background: transparent; border-radius: 9px; color: var(--sub); cursor: pointer; display: grid; place-items: center; }
    .sheet__x:hover { background: rgba(0,0,0,.06); }
    .sheet__x svg { width: 18px; height: 18px; }
    .sheet__list { flex: 1; overflow-y: auto; padding: 6px 28px 130px; display: flex; flex-direction: column; gap: 8px; }
    .qrow { display: flex; align-items: center; gap: 16px; padding: 11px 16px; border: 1px solid var(--dash); border-radius: 16px; transition: border-color .13s; }
    .qrow.is-done { border-color: var(--line); }
    .qrow__n { width: 26px; flex: none; text-align: center; font-family: var(--font-mono); font-size: 19px; font-weight: 700; color: var(--sub); font-variant-numeric: tabular-nums; }
    .qrow.is-done .qrow__n { color: var(--ink); }
    .qrow__opts { flex: 1; display: flex; justify-content: center; align-items: center; gap: 18px; }
    .bub { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--dash); background: transparent; color: var(--sub); font-family: var(--font-mono); font-size: 15px; font-weight: 700; cursor: pointer; display: grid; place-items: center; transition: .12s; }
    .bub:hover { border-color: var(--blue); color: var(--blue); }
    .bub.is-on { background: var(--blue); border-color: var(--blue); color: var(--n-000); }
    .bub.is-on svg { width: 15px; height: 15px; }
    /* 주관식 = 누르면 아래로 키패드 펼침 (버튼) */
    .qrow__short { flex: 1; display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 9px; border: 1px dashed var(--dash); background: transparent; cursor: pointer; font-family: inherit; transition: border-color .13s, background .13s; }
    .qrow__short__v { flex: 1; text-align: center; font-family: var(--font-mono); font-size: 15px; font-weight: 700; color: var(--ink); }
    .qrow__short.empty .qrow__short__v { color: var(--sub); font-family: var(--font-sans); font-weight: 500; }
    .qrow__short:hover { background: var(--opt-hover); border-color: var(--blue); }
    .qrow__short.is-open { border-style: solid; border-color: var(--yellow); background: var(--opt-hover); }
    .qrow__chev { width: 16px; height: 16px; flex: none; color: var(--sub); transition: transform .2s; }
    .qrow__short.is-open .qrow__chev { transform: rotate(180deg); color: var(--yellow); }
    /* 주관식 인라인 키패드 패널 */
    .qrow__pad { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: -2px 4px 4px; padding: 16px; border: 1px solid var(--line); border-radius: 16px; background: var(--panel); animation: padDrop .2s ease; }
    @keyframes padDrop { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { .qrow__pad { animation: none; } }
    /* 키패드 아래 입력완료 = 답 확정 + 아코디언 접기 */
    .qrow__pad-ok { width: 100%; padding: 11px; border: 0; border-radius: 12px; background: var(--th-accent); color: var(--n-000); font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: filter .1s; }
    .qrow__pad-ok:hover { filter: brightness(1.06); }
    .qrow__pad-ok:active { transform: translateY(1px); }
    .sheet__list::-webkit-scrollbar { width: 10px; }
    .sheet__list::-webkit-scrollbar-thumb { background: var(--n-200); border-radius: 999px; border: 3px solid var(--panel); background-clip: padding-box; }

    /* ===== 하단 콘솔 바 ===== */
    .bar { position: absolute; left: 0; right: 0; bottom: 0; z-index: 40; display: flex; align-items: flex-end; height: 99px; pointer-events: none; }
    .bar__deco { width: 262px; height: 99px; flex: none; }
    .bar__deco--l { margin-right: -1px; } .bar__deco--r { margin-left: -1px; }
    /* 하단 콘솔 = 일러스트(좌우 console-task SVG와 이어지는 고정색, 토큰/테마 무관).
       #eef0f6 = 콘솔 상단 립, #e0e6ef = 콘솔 본체 밴드 (SVG 실측 seam 색) */
    .bar__mid { flex: 1; height: 75px; background: #eef0f6; padding-top: 11px; align-self: flex-end; pointer-events: auto; }
    .bar__tray { height: 64px; background: #e0e6ef; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 clamp(16px,3vw,30px); }
    .bar__group { display: flex; gap: 12px; align-items: center; }
    .tbtn { display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; padding: 9px 18px; border: 0; border-radius: 16px; background: var(--n-500); color: var(--n-000); font-family: inherit; font-weight: 700; font-size: 15px; cursor: pointer; box-shadow: 0 4px 0 var(--n-650); transition: filter .12s, transform .06s, box-shadow .06s; }
    .tbtn:hover { filter: brightness(1.1); }
    .tbtn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--n-650); }
    .tbtn svg { width: 18px; height: 18px; }
    .tbtn:disabled { opacity: .38; cursor: not-allowed; filter: none; transform: none; box-shadow: 0 4px 0 var(--n-650); }
    .tbtn--primary { background: var(--primary); box-shadow: 0 4px 0 var(--primary-pressed); }
    .tbtn--primary:hover { background: var(--primary-hover); }
    .tbtn--primary:disabled { box-shadow: 0 4px 0 var(--primary-pressed); }

    /* 토스트 */
    .toast { position: fixed; left: 50%; bottom: 120px; transform: translateX(-50%) translateY(10px); z-index: 30; background: var(--n-650); color: var(--n-000); font-size: 14px; font-weight: 600; padding: 12px 20px; border-radius: 12px; box-shadow: 0 10px 30px -10px rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; }
    .toast.is-on { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 스크롤바 */
    .qpanel::-webkit-scrollbar { width: 10px; }
    .qpanel::-webkit-scrollbar-thumb { background: var(--n-200); border-radius: 999px; border: 3px solid var(--qpanel); background-clip: padding-box; }
    :root[data-theme="dark"] .qpanel::-webkit-scrollbar-thumb { background: var(--n-500); background-clip: padding-box; }
    :focus-visible { outline: 3px solid var(--yellow); outline-offset: 2px; }

    @media (max-width: 900px) {
      .bar__deco { display: none; }
      .content { flex-direction: column; }
      .omr { width: auto; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="screen__bg"></div>
    <div class="wrap">
      <!-- 헤더 -->
      <header class="hd">
        <nav class="bc">
          <span class="bc__strong">수학 <span class="bc__unit">중등 1-1</span></span>
          <svg class="bc__sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="bc__strong">2단원 <span style="font-weight:500">일차부등식과 연립방정식</span></span>
          <svg class="bc__sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="bc__t">일차부등식의 활용 실생활 문장제 극복 훈련</span>
        </nav>
        <div class="hd__acts">
          <button class="toggle" id="themeToggle" title="라이트/다크 전환"><span class="toggle__k"></span></button>
          <button class="hd__ico" title="알림"><img src="assets/figma/icons/ico-siren.svg" alt="알림" /></button>
          <button class="hd__ico" title="나가기"><img src="assets/figma/icons/ico-exit.svg" alt="나가기" /></button>
        </div>
      </header>

      <!-- 콘텐츠 -->
      <main class="content">
        <section class="qpanel" id="qpanel"></section>
        <aside class="omr">
          <div class="seg" id="seg">
            <button class="seg__btn is-active" data-seg="board">풀이 현황판</button>
            <button class="seg__btn" data-seg="sheet">답안표</button>
          </div>
          <div class="omr__prog">
            <div class="omr__ptop"><b>풀이한 문제</b><span id="progText">0/15</span></div>
            <div class="omr__track"><i id="progBar" style="width:0%"></i></div>
          </div>
          <div class="omr__grid" id="omrGrid"></div>
        </aside>
      </main>
    </div>

    <!-- 하단 콘솔 바 -->
    <div class="bar">
      <img class="bar__deco bar__deco--l" src="assets/figma/console-task-right.svg" alt="" />
      <div class="bar__mid">
        <div class="bar__tray">
          <div class="bar__group">
            <button class="tbtn" id="scratchBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>연습장</button>
            <button class="tbtn" id="prevBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>이전</button>
          </div>
          <div class="bar__group">
            <button class="tbtn" id="nextBtn">다음<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>
            <button class="tbtn tbtn--primary" id="submitBtn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg>제출하기</button>
          </div>
        </div>
      </div>
      <img class="bar__deco bar__deco--r" src="assets/figma/console-task-left.svg" alt="" />
    </div>

    <!-- 답안표 입력 오버레이 -->
    <div class="sheet-backdrop" id="sheetBackdrop"></div>
    <aside class="sheet" id="sheet" aria-hidden="true">
      <div class="sheet__head">
        <div class="sheet__ttl">답안표 입력</div>
        <p class="sheet__sub">문항별 답안을 마킹하거나 입력한 후 하단의 <b>제출하기</b> 버튼을 눌러주세요.</p>
        <button class="sheet__x" id="sheetClose" title="닫기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      </div>
      <div class="sheet__list" id="sheetList"></div>
    </aside>

    <div class="toast" id="toast"></div>
  </div>

  <script src="scripts/assignment-solve.js?v=2"></script>
</body>
</html>
