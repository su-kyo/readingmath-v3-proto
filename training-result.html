<!DOCTYPE html>
<html lang="ko" data-section="concept" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개념 훈련 · 학습 결과 — 리딩수학과학</title>
  <link rel="stylesheet" href="styles/tokens.css?v=18" />
  <link rel="stylesheet" href="styles/base.css?v=5" />
  <link rel="stylesheet" href="styles/components.css?v=5" />
  <link rel="stylesheet" href="styles/learn-shell.css?v=7" />
  <style>
    /* ===================================================================
       개념 훈련 '학습 결과' = 세부 단계 전부 완료 후 화면 (스텝 결과와 별개).
       서술형 학습 결과와 동일 골격, 개념(블루) 리테마.
       =================================================================== */
    .content {
      flex-direction: column; overflow: hidden;
      padding: clamp(14px,1.8vw,20px) clamp(14px,1.8vw,20px) 0;
      /* content 내부 = 공통 시스템(3과목 동일) */
      --card: var(--surface-1); --tcard: var(--surface-2); --dcard: var(--surface-2); --row: var(--surface-1); --comment: var(--surface-1);
      --ink: var(--text); --muted: var(--text-muted); --line: var(--border);
      --barbg: var(--surface-sunken); --barbr: var(--border);
      /* 포인트 = 과목색 1개(개념=블루) · 뱃지·게이지·보기버튼·타이틀아이콘 공용 */
      --pt: var(--th-accent);
      --numbg: var(--pt); --accent: var(--pt); --barfill: var(--pt); --view-br: var(--pt); --title-ico: var(--pt);
    }
    /* 프레임 테두리 = 헤더색(정적) · 다크·라이트 불변 */
    :root[data-theme="dark"] .content { background: var(--bg); border-color: var(--th-static); }
    :root[data-theme="light"] .content {
      background: var(--bg); border-color: var(--th-static);
      --card: var(--surface-1); --tcard: var(--surface-3); --dcard: var(--surface-2); --row: var(--surface-2); --comment: var(--surface-2);
      --ink: var(--text); --muted: var(--text-muted); --line: var(--border);
      --barbg: var(--surface-3); --barbr: var(--border);
    }

    .result-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: clamp(20px,2.4vw,32px) clamp(16px,2vw,24px) 96px;
      background: var(--card); border-radius: 32px; display: flex; flex-direction: column; gap: clamp(16px,2vw,20px); }
    .result-scroll::-webkit-scrollbar { width: 10px; }
    .result-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.18); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    :root[data-theme="light"] .result-scroll::-webkit-scrollbar-thumb { background: rgba(47,111,224,.28); background-clip: padding-box; }

    /* ===== 헤더 블록 ===== */
    .rhead { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; }
    .rhead__title { display: inline-flex; align-items: center; gap: 12px; margin-right: 4px; }
    .rhead__ico { width: 32px; height: 32px; border-radius: 11px; background: var(--title-ico); display: inline-flex; align-items: center; justify-content: center; }
    .rhead__ico svg { width: 18px; height: 18px; color: var(--n-000); }
    .rhead__title h1 { font-family: var(--font-sans); font-size: clamp(18px,1.8vw,20px); font-weight: 800; color: var(--ink); }
    .pill { display: inline-flex; align-items: center; gap: 8px; padding: 5px 15px; border-radius: 50px; box-shadow: inset 0 0 0 1px var(--line);
      font-family: var(--font-sans); font-size: clamp(13px,1.2vw,15px); font-weight: 600; color: var(--ink); }
    .pill svg { width: 16px; height: 16px; color: var(--muted); }
    .pill--round { font-weight: 800; letter-spacing: .02em; }
    .pill b { font-weight: 700; }

    /* ===== 본문: 총점 카드 + 표 ===== */
    .rbody { display: flex; align-items: stretch; gap: 16px; }
    .total { flex: none; width: clamp(220px,24vw,300px); background: var(--tcard); border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: clamp(18px,2vw,24px); }
    .total__star { width: clamp(88px,10vw,116px); height: auto; filter: drop-shadow(0 8px 18px rgba(0,0,0,.3)); }
    .total__score { display: flex; align-items: baseline; gap: 4px; font-family: var(--font-sans); color: var(--ink); }
    .total__score b { font-size: clamp(48px,6vw,64px); font-weight: 800; line-height: 1; }
    .total__score span { font-size: clamp(22px,2.4vw,32px); font-weight: 700; }
    .total__note { font-size: 13px; color: var(--muted); }

    .detail { flex: 1; min-width: 0; background: var(--dcard); border-radius: 16px; padding: clamp(12px,1.4vw,16px); display: flex; flex-direction: column; gap: 8px; }

    /* 표 (grid) */
    .trow { display: grid; grid-template-columns: minmax(150px,1.4fr) 88px 60px 60px minmax(130px,1fr) 96px; align-items: center; }
    .thead { padding: 4px 8px; }
    .thead .tcell { color: var(--muted); font-family: var(--font-sans); font-size: 14px; font-weight: 600; }
    .trow--data { background: var(--row); border-radius: 16px; padding: 10px 8px; }
    .trow--total { padding: 8px 8px; }
    .tcell { display: flex; align-items: center; justify-content: center; padding: 0 8px; font-family: var(--font-sans); color: var(--ink); }
    .tcell--name { justify-content: flex-start; gap: 10px; }
    .tnum { width: 24px; height: 24px; border-radius: 8px; background: var(--numbg); color: var(--n-000); display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex: none; }
    .tname { font-size: clamp(15px,1.4vw,20px); font-weight: 700; }
    .tgrade { height: 40px; }
    .tbig { font-family: var(--font-sans); font-size: 20px; font-weight: 700; }
    .tcell--rate { flex-direction: column; align-items: stretch; gap: 6px; }
    .trate__val { font-family: var(--font-sans); font-size: clamp(15px,1.4vw,20px); font-weight: 700; text-align: center; }
    .trate__bar { height: 10px; border-radius: 50px; background: var(--barbg); box-shadow: inset 0 0 0 1px var(--barbr); overflow: hidden; }
    .trate__fill { height: 100%; border-radius: 50px; background: var(--barfill); transition: width .6s ease; }
    .tview { padding: 7px 0; width: 100%; max-width: 74px; border-radius: 8px; box-shadow: inset 0 0 0 1px var(--view-br); background: transparent; color: var(--view-br); font-family: var(--font-sans); font-weight: 600; font-size: 15px; cursor: pointer; }
    .tview:hover { background: color-mix(in srgb, var(--view-br) 12%, transparent); }
    .tdivider { height: 1px; background: var(--line); margin: 2px 8px; }

    /* ===== 코멘트 ===== */
    .comment { background: var(--comment); border-radius: 16px; padding: clamp(18px,2vw,24px); font-family: var(--font-sans);
      font-size: clamp(15px,1.4vw,18px); line-height: 1.6; color: var(--ink); white-space: pre-line; }

    /* 토스트 */
    .rtoast { position: fixed; left: 50%; bottom: 118px; transform: translateX(-50%) translateY(10px); z-index: 400; padding: 10px 18px; border-radius: 999px; font-family: var(--font-sans); font-size: 14px; font-weight: 600; background: rgba(10,20,44,.94); color: var(--n-000); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; }
    .rtoast.is-on { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 900px) {
      .rbody { flex-direction: column; } .total { width: auto; }
      .trow { grid-template-columns: minmax(120px,1.3fr) 64px 48px 48px minmax(100px,1fr) 80px; }
    }
  </style>
</head>
<body class="learn-body">
  <div class="screen">
    <div class="screen__bg"></div>

    <div class="screen__container">
      <header class="lheader">
        <nav class="breadcrumb">
          <span class="crumb crumb--strong">과학 중등 1-1</span>
          <svg class="sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb crumb--strong crumb--clip crumb--hide">2단원 생물의 구성과 다양성</span>
          <svg class="sep crumb--hide" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb crumb--hide">(1) 생물의 구성</span>
          <svg class="sep crumb--hide" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb crumb--strong">개념 훈련 결과</span>
        </nav>
        <div class="lheader__actions">
          <button class="theme-toggle" id="themeToggle" title="라이트/다크 전환"><span class="theme-toggle__knob"></span></button>
          <button class="nav-ico" title="알림"><img src="assets/figma/icons/ico-siren.svg" alt="알림" /></button>
          <button class="nav-ico" title="나가기"><img src="assets/figma/icons/ico-exit.svg" alt="나가기" /></button>
        </div>
      </header>

      <main class="content">
        <div class="result-scroll">
          <!-- 헤더 블록 -->
          <div class="rhead">
            <div class="rhead__title">
              <span class="rhead__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
              <h1>개념 훈련 결과</h1>
            </div>
            <span class="pill pill--round">ROUND 1</span>
            <span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>완료 <b>2024-04-15 15:40</b></span>
            <span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M9 2h6"/></svg>소요 <b>28:10</b></span>
          </div>

          <!-- 총점 + 표 -->
          <div class="rbody">
            <div class="total">
              <img class="total__star" id="totalStar" src="assets/figma/star-a.svg" alt="등급" />
              <div class="total__score"><b id="score">0</b><span>점</span></div>
              <div class="total__note">ⓘ 개념 훈련 3단계 종합</div>
            </div>
            <div class="detail">
              <div class="trow thead">
                <div class="tcell tcell--name">학습 구분</div>
                <div class="tcell">점수</div>
                <div class="tcell">정답</div>
                <div class="tcell">문제</div>
                <div class="tcell">정답률</div>
                <div class="tcell">상세</div>
              </div>
              <div id="rows"></div>
              <div class="tdivider"></div>
              <div class="trow trow--total" id="totalRow"></div>
            </div>
          </div>

          <!-- 코멘트 -->
          <div class="comment" id="comment"></div>
        </div>
      </main>
    </div>

    <!-- 하단 콘솔 바 (개념 = 기본 블루) -->
    <div class="bar">
      <img class="bar__deco bar__deco--l" src="assets/figma/console-right.svg" alt="" />
      <div class="bar__mid">
        <div class="bar__tray">
          <div class="bar__group">
            <button class="toolbtn"><img src="assets/figma/icons/ico-note.svg" alt="" /><span>연습장</span></button>
            <button class="toolbtn" id="noteBtn"><img src="assets/figma/icons/ico-note.svg" alt="" /><span>오답노트 확인하기</span></button>
          </div>
          <div class="bar__group">
            <button class="toolbtn toolbtn--primary" id="homeBtn"><img src="assets/figma/icons/ico-summary.svg" alt="" /><span>홈으로</span></button>
          </div>
        </div>
      </div>
      <img class="bar__deco bar__deco--r" src="assets/figma/console-left.svg" alt="" />
    </div>
  </div>

  <div class="rtoast" id="toast"></div>

  <script src="scripts/concept-training-result.js"></script>
</body>
</html>
