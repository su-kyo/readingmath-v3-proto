<!DOCTYPE html>
<html lang="ko" data-theme="light" data-section="assign">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과제 결과 — 리딩수학과학</title>
  <script>try{if(localStorage.getItem('rm-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
  <link rel="stylesheet" href="styles/tokens.css?v=18" />
  <style>
    /* =========================================================================
       과제 센터 · 결과 화면 (assignment-result) — 우주 셸 (풀이 화면과 동일)
       · 헤더 블록(과제 결과 + 제출완료) · 요약(점수/정답·오답·미입력) · 문항별 채점표
       ========================================================================= */
    :root {
      --hd: var(--th-static); --blue: var(--th-ink-accent); --ink: var(--n-650); --sub: var(--text-meta); --faint: var(--text-muted);
      /* 라이트 표면 — content 거터(살짝틴트) → rpanel(메인) 흰색 */
      --panel: var(--n-000); --content: var(--n-100); --line: var(--n-200); --line-2: var(--border);
      --good: var(--ok-ink); --bad: var(--no-solid); --bad-ic: var(--no-solid); --correct: var(--ok-ink);
      --score-bg: var(--n-100);
    }
    :root[data-theme="dark"] {
      /* 다크 표면 — 뉴트럴 램프 단조증가(bg n-900 < 패널 n-800 < 카드 n-600)로 대비 확보 */
      --panel: var(--n-800); --content: var(--n-900); --ink: var(--n-050); --sub: var(--text-muted); --faint: var(--text-muted);
      --line: var(--border-strong); --line-2: var(--border); --score-bg: var(--n-600);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { font-family: var(--font-sans); background: var(--assign-body); overflow: hidden; -webkit-font-smoothing: antialiased; }

    .screen { position: relative; width: 100%; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .screen__bg { position: absolute; inset: 0; z-index: 0; background: url("assets/figma/bg-spaceship-task.png") center/cover no-repeat; }
    :root[data-theme="dark"] .screen__bg::after { content: ""; position: absolute; inset: 0; background: rgba(4,10,30,.45); }
    .wrap { position: relative; z-index: 1; flex: 1; min-height: 0; display: flex; flex-direction: column; padding: clamp(16px,2.4vw,30px) clamp(20px,5vw,72px) 0; gap: 14px; }

    /* 헤더 (풀이 화면과 동일) */
    .hd { flex: none; display: flex; align-items: center; justify-content: space-between; gap: 16px; background: var(--hd); border-radius: 30px; padding: 9px 12px 9px 28px; color: var(--n-000); }
    .bc { display: flex; align-items: center; gap: 8px; min-width: 0; font-size: 14px; }
    .bc__strong { font-weight: 800; letter-spacing: -.02em; white-space: nowrap; }
    .bc__t { opacity: .92; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bc__sep { opacity: .5; flex: none; }
    .hd__acts { display: flex; align-items: center; gap: 8px; flex: none; }
    .toggle { width: 62px; height: 32px; border-radius: 999px; background: rgba(0,0,0,.28); border: 0; position: relative; cursor: pointer; padding: 0; }
    .toggle__k { position: absolute; top: 2px; left: 2px; width: 28px; height: 28px; border-radius: 50%; background: center/contain no-repeat url("assets/figma/icons/ico-sun.svg"); transition: left .2s ease; }
    :root[data-theme="dark"] .toggle__k { left: 32px; background-image: url("assets/figma/icons/ico-moon.svg"); }
    .hd__ico { width: 34px; height: 34px; border: 0; border-radius: 11px; background: rgba(255,255,255,.14); color: var(--n-000); display: grid; place-items: center; cursor: pointer; transition: .14s; }
    .hd__ico:hover { background: rgba(255,255,255,.26); }
    .hd__ico svg, .hd__ico img { width: 19px; height: 19px; }

    /* 콘텐츠 (단일 패널) */
    /* 프레임 테두리 = 헤더색(정적) · 다크·라이트 불변 */
    .content { flex: 1; min-height: 0; display: flex; background: var(--content); border: 6px solid var(--th-static); border-bottom: 0; border-radius: 34px 34px 0 0; padding: 8px 8px 0; }
    .rpanel { flex: 1; min-width: 0; overflow-y: auto; background: var(--panel); border-radius: 30px 30px 0 0; padding: 32px 34px 120px; display: flex; flex-direction: column; gap: 30px; }

    /* 결과 헤더 블록 */
    .rhead { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .rhead__t { font-size: 24px; font-weight: 700; color: var(--blue); letter-spacing: -.03em; }
    .rhead__sub { font-size: 22px; font-weight: 400; color: var(--blue); letter-spacing: -.02em; min-width: 0; }
    .rdate { margin-left: auto; display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px; border: 1px solid var(--good); border-radius: 11px; font-size: 15px; white-space: nowrap; }
    .rdate__tag { display: inline-flex; align-items: center; gap: 5px; color: var(--good); font-weight: 600; }
    .rdate__tag svg { width: 16px; height: 16px; }
    .rdate__d { color: var(--ink); font-variant-numeric: tabular-nums; }

    /* 요약 */
    .summary { display: flex; gap: 20px; }
    .score { flex: 0 0 auto; min-width: 288px; display: flex; align-items: center; justify-content: center; gap: 14px; padding: 18px 28px; background: var(--score-bg); border-radius: 24px; }
    .score__n { font-size: 62px; font-weight: 800; color: var(--blue); letter-spacing: -.04em; line-height: 1; font-variant-numeric: tabular-nums; }
    .score__d { font-size: 26px; font-weight: 500; color: var(--sub); }
    .stats { flex: 1; display: flex; align-items: center; justify-content: center; gap: 44px; padding: 16px 40px; border: 1px solid var(--line); border-radius: 24px; }
    .stat { display: flex; flex-direction: column; gap: 3px; }
    .stat__k { font-size: 15px; font-weight: 700; }
    .stat__v { font-size: 30px; font-weight: 800; color: var(--ink); letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
    .stat__v small { font-size: 20px; font-weight: 500; color: var(--sub); margin-left: 1px; }
    .stat--correct .stat__k { color: var(--good); }
    .stat--wrong .stat__k { color: var(--bad); }
    .stat--none .stat__k { color: var(--text-meta); }
    .stat-div { width: 1px; align-self: stretch; background: var(--line); }

    /* 채점표 */
    .rtable { display: flex; flex-direction: column; }
    .trow { display: grid; grid-template-columns: 56px minmax(180px, 300px) 84px 1fr 108px; align-items: center; gap: 12px; padding: 14px 10px; border-bottom: 1px solid var(--line-2); }
    .trow[data-q] { cursor: pointer; transition: background .12s; }
    .trow[data-q]:hover { background: var(--th-tint); }
    :root[data-theme="dark"] .trow[data-q]:hover { background: var(--th-tint-strong); }
    .trow--head { border-bottom: 1px solid var(--line); }
    .trow--head > * { font-size: 15px; font-weight: 700; color: var(--sub); }
    .tc-center { text-align: center; }
    .tc-num { text-align: center; font-size: 16px; color: var(--sub); font-variant-numeric: tabular-nums; }
    .tc-name { font-size: 15px; color: var(--ink); font-weight: 500; }
    .tc-text { font-size: 15px; color: var(--ink); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .lv { justify-self: center; padding: 2px 10px; border-radius: 35px; font-size: 14px; font-weight: 500; }
    .lv--기본 { background: var(--info-tint); color: var(--info-ink); }
    .lv--실력 { background: var(--th-tint); color: var(--th-ink-accent); }
    .lv--심화 { background: var(--warn-tint); color: var(--warn-ink); }
    /* 다크: tint 토큰이 라이트값 그대로라 전환 안 되고 실력(8% accent)은 거의 안 보임 → 다크 전용 반투명 배경 + 밝은 글자 */
    :root[data-theme="dark"] .lv--기본 { background: color-mix(in srgb, var(--info-solid) 22%, transparent); color: var(--info-on-dark); }
    :root[data-theme="dark"] .lv--실력 { background: color-mix(in srgb, var(--th-accent) 24%, transparent); color: var(--th-accent-hi); }
    :root[data-theme="dark"] .lv--심화 { background: color-mix(in srgb, var(--warn-solid) 26%, transparent); color: var(--warn-on-dark); }
    .grade { justify-self: center; display: inline-flex; align-items: center; gap: 7px; font-size: 15px; font-weight: 600; }
    .grade__ic { width: 20px; height: 20px; border-radius: 50%; display: grid; place-items: center; color: var(--n-000); flex: none; }
    .grade__ic svg { width: 11px; height: 11px; }
    .grade--o { color: var(--correct); } .grade--o .grade__ic { background: var(--ok-solid); }
    .grade--x { color: var(--bad); } .grade--x .grade__ic { background: var(--bad-ic); }

    /* 하단 콘솔 바 */
    .bar { position: absolute; left: 0; right: 0; bottom: 0; z-index: 40; display: flex; align-items: flex-end; height: 99px; pointer-events: none; }
    .bar__deco { width: 262px; height: 99px; flex: none; }
    .bar__deco--l { margin-right: -1px; } .bar__deco--r { margin-left: -1px; }
    .bar__mid { flex: 1; height: 75px; background: var(--n-100); padding-top: 11px; align-self: flex-end; pointer-events: auto; }
    .bar__tray { height: 64px; background: var(--n-100); display: flex; align-items: center; justify-content: center; gap: 16px; padding: 0 clamp(16px,3vw,30px); }
    .tbtn { display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; padding: 9px 20px; border: 0; border-radius: 16px; background: var(--n-500); color: var(--n-000); font-family: inherit; font-weight: 700; font-size: 15px; cursor: pointer; box-shadow: 0 4px 0 var(--n-650); transition: filter .12s, transform .06s, box-shadow .06s; }
    .tbtn:hover { filter: brightness(1.1); }
    .tbtn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--n-650); }
    .tbtn svg { width: 18px; height: 18px; }
    .tbtn--primary { background: var(--primary); box-shadow: 0 4px 0 var(--primary-pressed); }
    .tbtn--primary:hover { background: var(--primary-hover); }

    .toast { position: fixed; left: 50%; bottom: 120px; transform: translateX(-50%) translateY(10px); z-index: 50; background: var(--n-650); color: var(--n-000); font-size: 14px; font-weight: 600; padding: 12px 20px; border-radius: 12px; box-shadow: 0 10px 30px -10px rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; }
    .toast.is-on { opacity: 1; transform: translateX(-50%) translateY(0); }

    .rpanel::-webkit-scrollbar { width: 10px; }
    .rpanel::-webkit-scrollbar-thumb { background: var(--n-200); border-radius: 999px; border: 3px solid var(--panel); background-clip: padding-box; }
    :root[data-theme="dark"] .rpanel::-webkit-scrollbar-thumb { background: var(--n-500); background-clip: padding-box; }
    :focus-visible { outline: 3px solid var(--current); outline-offset: 2px; }

    @media (max-width: 900px) {
      .bar__deco { display: none; }
      .summary { flex-direction: column; }
      .score { min-width: 0; }
      .trow { grid-template-columns: 44px 1fr 72px 96px; }
      .tc-text { display: none; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="screen__bg"></div>
    <div class="wrap">
      <header class="hd">
        <nav class="bc">
          <span class="bc__strong">수학 중등 1-1</span>
          <svg class="bc__sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="bc__strong">2단원 <span style="font-weight:500">일차부등식과 연립방정식</span></span>
          <svg class="bc__sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="bc__t">일차부등식의 활용 실생활 문장제 극복 훈련</span>
        </nav>
        <div class="hd__acts">
          <button class="toggle" id="themeToggle" title="라이트/다크 전환"><span class="toggle__k"></span></button>
          <button class="hd__ico" title="알림"><img src="assets/figma/icons/ico-siren.svg" alt="알림" /></button>
          <button class="hd__ico" title="나가기"><img src="assets/figma/icons/ico-exit.svg" alt="나가기" /></button>
        </div>
      </header>

      <main class="content">
        <section class="rpanel">
          <div class="rhead">
            <span class="rhead__t">과제 결과</span>
            <span class="rhead__sub">일차부등식의 활용 실생활 문장제 극복 훈련</span>
            <span class="rdate"><span class="rdate__tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="2.5"/><path d="M8 2.5v4M16 2.5v4M3 9.5h18"/></svg>제출 완료</span><span class="rdate__d">2026.05.21 15:30</span></span>
          </div>

          <div class="summary">
            <div class="score"><span class="score__n" id="scoreN">0</span><span class="score__d">/100점</span></div>
            <div class="stats">
              <div class="stat stat--correct"><span class="stat__k">정답</span><span class="stat__v" id="cCorrect">0 <small>/ 15</small></span></div>
              <span class="stat-div"></span>
              <div class="stat stat--wrong"><span class="stat__k">오답</span><span class="stat__v" id="cWrong">0 <small>문항</small></span></div>
              <span class="stat-div"></span>
              <div class="stat stat--none"><span class="stat__k">미입력</span><span class="stat__v" id="cNone">0 <small>문항</small></span></div>
            </div>
          </div>

          <div class="rtable" id="rtable"></div>
        </section>
      </main>
    </div>

    <div class="bar">
      <img class="bar__deco bar__deco--l" src="assets/figma/console-task-right.svg" alt="" />
      <div class="bar__mid">
        <div class="bar__tray">
          <button class="tbtn" id="homeBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/></svg>과제 센터</button>
          <button class="tbtn tbtn--primary" id="applyBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>시험 대비 반영 확인</button>
          <button class="tbtn tbtn--primary" id="explainBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15H6.5A2.5 2.5 0 0 0 4 20.5zM4 20.5V5.5"/></svg>해설보기</button>
        </div>
      </div>
      <img class="bar__deco bar__deco--r" src="assets/figma/console-task-left.svg" alt="" />
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script src="scripts/assignment-result.js"></script>
</body>
</html>
