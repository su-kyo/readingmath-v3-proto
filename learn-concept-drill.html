<!DOCTYPE html>
<html lang="ko" data-section="concept" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기초 연산 · 개념 훈련 — 리딩수학과학</title>
  <link rel="stylesheet" href="styles/tokens.css?v=18" />
  <link rel="stylesheet" href="styles/base.css?v=4" />
  <link rel="stylesheet" href="styles/components.css?v=5" />
  <link rel="stylesheet" href="styles/learn-shell.css?v=7" />
  <style>
    /* 콘텐츠 패널을 세로 3분할: [상단 프로그레스 고정] [문제 스크롤] [채점 버튼 고정] */
    .content { position: relative; flex-direction: column; padding: 0 0 96px; overflow: hidden; --fade: var(--th-panel); }
    :root[data-theme="dark"] .content { --fade: var(--surface-1); }
    /* 스크롤 영역을 cap 아래에서 시작 (스크롤해도 cap 뒤로 안 숨음) */
    .ops-wrap { flex: 1; min-height: 0; position: relative; margin-top: 14px; }
    .ops-wrap::after { /* 아래에 콘텐츠 더 있음 */
      content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 48px; pointer-events: none; z-index: 1;
      background: linear-gradient(to top, var(--fade), transparent); opacity: 0; transition: opacity .2s ease;
    }
    .ops-wrap::before { /* 위에 가려진 콘텐츠 있음 */
      content: ""; position: absolute; left: 0; right: 0; top: 0; height: 44px; pointer-events: none; z-index: 1;
      background: linear-gradient(to bottom, var(--fade), transparent); opacity: 0; transition: opacity .2s ease;
    }
    .ops-wrap.has-more::after { opacity: 1; }
    .ops-wrap.has-more-top::before { opacity: 1; }
    .ops {
      position: absolute; inset: 0; overflow-y: auto; display: flex; flex-direction: column; align-items: center;
      padding: 6px clamp(24px, 5vw, 56px) 26px;
      --qtext: var(--text); --muted: var(--text-muted); --ex-bg: var(--surface-2); --ex-br: rgba(255,255,255,.06);
      --opt-bg: var(--surface-3); --opt-br: rgba(255,255,255,.08); --opt-hover: var(--surface-hover);
      --input-bg: var(--surface-2); --input-br: var(--border-strong);
    }
    :root[data-theme="light"] .ops {
      --qtext: var(--n-600); --muted: var(--text-muted); --ex-bg: var(--th-tint); --ex-br: var(--border);
      --opt-bg: var(--n-000); --opt-br: var(--border-strong); --opt-hover: var(--n-050);
      --input-bg: var(--n-000); --input-br: var(--border-strong);
    }
    /* 스크롤바 확실히 보이게 */
    .ops::-webkit-scrollbar { width: 10px; }
    .ops::-webkit-scrollbar-thumb { background: rgba(255,255,255,.24); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    :root[data-theme="light"] .ops::-webkit-scrollbar-thumb { background: rgba(20,32,58,.22); background-clip: padding-box; }

    /* ===== 문제 카드 (번호탭 헤더 + 접이식 · 프레임 테두리색과 면 공유 · 상단 부착) ===== */
    .problem { flex: none; width: min(1040px, calc(100% - 2 * clamp(24px, 5vw, 56px))); margin: 0 auto;
      overflow: hidden; background: var(--th-static); border-radius: 0 0 18px 18px; box-shadow: 0 10px 24px rgba(8,5,22,.28); }
    .problem__head { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 16px; background: transparent; border: 0; }
    .problem.is-collapsible .problem__head { cursor: pointer; }
    .qtabs { display: inline-flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .qtab { min-width: 28px; height: 28px; padding: 0 7px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--font-sans); font-weight: 800; font-size: 13px; background: rgba(255,255,255,.10); color: rgba(255,255,255,.5); transition: background .16s, color .16s, box-shadow .16s; }
    .qtab svg { width: 15px; height: 15px; }
    .qtab.is-done { background: color-mix(in srgb, var(--th-accent) 48%, transparent); color: #fff; }
    /* 현재 문제 = 흰 링으로 대비 강화 (색맹 대비: border 형태로 구분) */
    .qtab.is-active { background: var(--th-accent); color: #fff; box-shadow: 0 0 0 2px #fff, 0 2px 8px rgba(0,0,0,.32); }
    /* 정/오답 = 색 + 아이콘(색맹 접근성) */
    .qtab.is-correct { background: var(--ok-solid); color: #fff; }
    .qtab.is-wrong { background: var(--no-solid); color: #fff; }
    .problem__chev { width: 22px; height: 22px; color: rgba(255,255,255,.62); transition: transform .25s; flex: none; transform: rotate(180deg); }
    .problem.is-collapsed .problem__chev { transform: rotate(0); }
    /* 본문 = 문제문(좌) + 참고자료(우) 한 행 · 밝은 톤(어두운 패널) */
    .problem__body { padding: 6px 18px 18px; overflow: hidden; max-height: 1200px; color: rgba(249,249,249,.92);
      display: flex; gap: 20px; align-items: flex-start; transition: max-height .32s ease, opacity .25s ease, padding .32s ease; }
    .problem.is-collapsed .problem__body { max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0; }
    .problem__body .q__text { flex: 1 1 auto; min-width: 0; margin-bottom: 0; color: rgba(249,249,249,.94); }
    .problem__body .ex { flex: none; width: clamp(200px, 36%, 340px); margin: 0; background: rgba(255,255,255,.07); }
    .problem__body .ex__list { color: rgba(249,249,249,.85); }
    .problem__body .ex__skel { color: rgba(255,255,255,.6); }

    /* ===== 문제 (풀이 영역) ===== */
    .q { width: min(1040px, 100%); margin: 0; display: flex; flex-direction: column; align-items: center; }
    .q__text { align-self: stretch; font-size: clamp(16px, 1.5vw, 20px); font-weight: 700; color: var(--qtext); line-height: 1.6; margin-bottom: 20px; }
    .ex { align-self: stretch; background: var(--ex-bg); border-radius: 18px; padding: 20px 24px; margin-bottom: 22px; }
    .ex__list { display: flex; flex-direction: column; gap: 10px; font-size: clamp(15px,1.4vw,18px); color: var(--qtext); line-height: 1.5; }
    .ex__skel { min-height: 140px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-weight: 700; }
    .ex__shape { display: flex; justify-content: center; }

    /* 객관식 */
    .opts-row { align-self: stretch; display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .opts-row .opt { flex: 1 1 0; min-width: 120px; }
    .opts-grid { align-self: stretch; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
    .opt {
      display: flex; align-items: center; gap: 12px; padding: 15px 20px; min-height: 60px;
      border-radius: 14px; background: var(--opt-bg); box-shadow: inset 0 0 0 1.5px var(--opt-br);
      color: var(--qtext); font-size: clamp(15px,1.35vw,17px); font-weight: 600; text-align: left; cursor: pointer;
      transition: background .12s, box-shadow .12s;
    }
    .opt:hover { background: var(--opt-hover); }
    .opt__num { flex: none; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,.14); color: var(--qtext); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; position: relative; }
    :root[data-theme="light"] .opt__num { background: var(--th-tint-strong); color: var(--th-ink-accent); }
    .opt--num { justify-content: center; } .opt--num .opt__num { width: 34px; height: 34px; }
    .opt__img { width: 100%; height: 96px; border-radius: 10px; background: var(--n-200); }
    .opt--img { flex-direction: column; align-items: stretch; }
    /* 선택: 채움만 (테두리 X) */
    .opt.is-selected { background: var(--th-accent); box-shadow: none; color: var(--n-000); }
    .opt.is-selected .opt__num { background: var(--n-000); color: transparent; }
    .opt.is-selected .opt__num::after { content: "✓"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--th-accent); font-weight: 900; }
    /* 채점: 정답표시 칸은 숫자, 내가 고른 칸만 아이콘 (겹침 방지) */
    .opt.is-correct { background: color-mix(in srgb, var(--ok-solid) 36%, var(--opt-bg)); box-shadow: inset 0 0 0 2px var(--ok-solid); color: var(--qtext); }
    .opt.is-correct .opt__num { background: var(--ok-solid); }
    .opt.is-correct:not(.is-selected) .opt__num { color: var(--n-000); }
    .opt.is-correct.is-selected .opt__num::after { color: var(--n-000); }
    .opt.is-wrong { background: color-mix(in srgb, var(--no-solid) 36%, var(--opt-bg)); box-shadow: inset 0 0 0 2px var(--no-solid); color: var(--qtext); }
    .opt.is-wrong .opt__num { background: var(--no-solid); }
    .opt.is-wrong:not(.is-selected) .opt__num { color: var(--n-000); }
    .opt.is-wrong.is-selected .opt__num::after { content: "✕"; color: var(--n-000); }
    .opts-row.is-graded .opt, .opts-grid.is-graded .opt { cursor: default; pointer-events: none; }

    /* 주관식 / 분수 */
    .answer-row { display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap; }
    .sfield { display: flex; align-items: center; gap: 8px; }
    .sfield__tag { font-weight: 800; color: var(--qtext); }
    /* 주관식 input = 깔끔한 단일 테두리 박스 (분수 혼동 방지) */
    .sinput {
      height: 54px; min-width: 200px; padding: 0 16px; text-align: center;
      background: var(--input-bg); border: 1.5px solid var(--input-br); border-radius: 14px;
      color: var(--qtext); font-size: 18px; font-weight: 700; font-family: var(--font-sans); cursor: pointer;
    }
    .sinput::placeholder { color: var(--muted); font-weight: 500; }
    .sinput:focus, .sinput.is-active-input { outline: none; border-color: var(--primary); }
    .sinput.is-correct { border-color: var(--ok-solid); color: var(--ok-solid); }
    .sinput.is-wrong { border-color: var(--no-solid); color: var(--no-solid); }
    /* 분수 = 분자박스 / 바 / 분모박스 */
    .fraction { display: inline-flex; flex-direction: column; align-items: center; gap: 8px; }
    .fraction .sinput { min-width: 96px; width: 96px; height: 50px; padding: 0 10px; }
    .fraction__bar { width: 104px; height: 3px; background: var(--qtext); border-radius: 2px; }

    /* 주관식 오답 시 정답 표시 (별도 공간) */
    .ans-correct { display: none; margin-top: 22px; padding: 10px 22px; border-radius: 12px; background: color-mix(in srgb, var(--ok-solid) 22%, transparent); color: var(--ok-ink); font-weight: 700; font-size: 16px; align-items: center; gap: 8px; }
    .ans-correct.show { display: inline-flex; }
    .ans-correct b { color: var(--ok-solid); font-size: 19px; }

    /* ===== 계산기 키패드 (라이트·다크 공통 / 과목색 베리에이션) ===== */
    .keypad {
      position: fixed; z-index: 45; width: 244px; padding: 12px;
      background: var(--th-chip); border-radius: 22px; border: 1.5px solid var(--border-strong);
      box-shadow: 0 24px 55px rgba(10,24,60,.42), inset 0 0 0 3.5px var(--n-050);   /* 피그마 정합: 외곽 테두리 + 안쪽 링(베젤) */
      opacity: 0; visibility: hidden; translate: 0 6px; transition: opacity .14s, translate .14s, visibility .14s;
      --kp-accent: var(--th-accent); --kp-num: var(--cyan-400);   /* 기본(개념) = 블루/시안 */
    }
    .keypad.is-open { opacity: 1; visibility: visible; translate: 0 0; }
    .keypad--type  { --kp-accent: var(--teal-500); --kp-num: var(--teal-300); }   /* 유형 */
    .keypad--essay { --kp-accent: var(--violet-500); --kp-num: var(--violet-300); }   /* 서술형 */
    .keypad__display { height: 50px; border-radius: 12px; background: var(--n-700); color: var(--kp-num); display: flex; align-items: center; justify-content: flex-end; padding: 0 16px; font-size: 24px; font-weight: 700; font-family: var(--font-mono); margin-bottom: 10px; }
    .keypad__grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .kp-key { height: 46px; border-radius: 12px; background: var(--n-000); color: var(--n-600); font-weight: 700; font-size: 18px; font-family: var(--font-sans); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 3px rgba(20,40,90,.1); }
    .kp-key:hover { background: var(--n-050); }
    .kp-key:active { transform: translateY(1px); box-shadow: none; }
    .kp-key--op { color: var(--kp-accent); font-size: 20px; }
    .kp-key[data-k="0"] { grid-column: span 2; }
    .kp-ok { grid-column: span 4; height: 48px; background: var(--kp-accent); color: var(--n-000); font-weight: 800; font-size: 18px; box-shadow: none; }
    .kp-ok:hover { background: var(--kp-accent); filter: brightness(1.08); }

    /* ===== 하단 고정 채점 버튼 ===== */
    .ops__foot { flex: none; display: flex; justify-content: center; padding: 10px 0 4px; }
    .btn-grade { padding: 14px 44px; border-radius: 16px; background: var(--th-accent); color: var(--n-000); font-weight: 800; font-size: 18px; box-shadow: 0 4px 0 var(--th-accent-strong); }
    .btn-grade:hover:not(:disabled) { background: var(--th-accent); } .btn-grade:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 var(--th-accent-strong); }
    .btn-grade:disabled { background: var(--n-500); color: var(--n-300); box-shadow: none; cursor: not-allowed; }
    .btn-grade--next { background: var(--primary); box-shadow: 0 4px 0 var(--primary-pressed); }
    .btn-grade--next:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-grade[hidden] { display: none; }

    /* 하단바 다음으로 비활성 */
    .toolbtn:disabled { opacity: .5; filter: grayscale(.5); cursor: not-allowed; }

    /* ===== 빈칸(인라인 채우기) 문제 타입 — 개념 다지기 고유 ===== */
    .qblank { align-self: stretch; width: min(880px, 100%); margin: 0 auto; color: var(--qtext); }
    .qstep { font-size: clamp(15px, 1.4vw, 18px); line-height: 2.3; margin-bottom: 10px; }
    .qstep__no { color: var(--muted); font-weight: 700; margin-right: 6px; }
    .dblank {
      position: relative; display: inline-flex; align-items: center; justify-content: center; vertical-align: middle;
      min-width: 46px; height: 32px; padding: 0 10px; margin: 0 3px; box-sizing: border-box;
      border-radius: 8px; font-weight: 700; font-family: var(--font-sans); font-size: 16px; cursor: pointer;
      background: var(--input-bg); border: 1.7px dashed var(--input-br); color: var(--qtext); transition: background .12s, border-color .12s;
    }
    .dblank:hover { background: var(--opt-hover); }
    .dblank.is-filled { border-style: solid; }
    .dblank.is-active-input { border-color: var(--primary); border-style: solid; box-shadow: 0 0 0 3px rgba(255,127,0,.16); }
    /* 채점 후: 정답 칸은 잠금 */
    .dblank.is-correct { border-style: solid; border-color: var(--ok-solid); color: var(--ok-solid); cursor: default; }
    .dblank.is-correct:hover { background: var(--input-bg); }
    /* 오답 = 내 답(빨강·취소선). 클릭하면 같은 칸이 정답(초록)으로 토글 — 정답을 옆에 병렬 표시하지 않음 */
    .dblank.is-wrong { border-style: solid; border-color: var(--no-solid); color: var(--no-solid);
      text-decoration: line-through; text-decoration-color: var(--no-solid); text-decoration-thickness: 1.5px; }
    .dblank.is-wrong:hover { background: color-mix(in srgb, var(--no-solid) 10%, transparent); }
    .dblank.is-wrong.show-ans { border-color: var(--ok-solid); color: var(--ok-solid); text-decoration: none; }
    .dblank.is-wrong.show-ans:hover { background: color-mix(in srgb, var(--ok-solid) 10%, transparent); }
    /* 정답 확인 = 우측 상단 원형 뱃지 (정답 초록 ✓ / 오답 빨강 ✕) — 색맹도 모양으로 구분.
       오답을 눌러 정답으로 치환한 칸은 정답 스타일이되 뱃지 없음(원래 맞힌 칸과 구분) */
    .dblank.is-correct::after, .dblank.is-wrong::after {
      position: absolute; top: -8px; right: -8px; width: 17px; height: 17px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 10px; color: #fff;
      text-decoration: none; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
    .dblank.is-correct::after { content: '✓'; background: var(--ok-solid); }
    .dblank.is-wrong::after { content: '✕'; background: var(--no-solid); }
    .dblank.is-wrong.show-ans::after { content: none; }
    /* 세로셈 */
    .vsub { display: inline-grid; grid-template-columns: 26px repeat(3, 42px); gap: 7px 9px; align-items: center; justify-items: center;
      font-family: var(--font-mono); font-size: 30px; color: var(--qtext); margin: 4px auto 2px; }
    .vsub__op { color: var(--muted); font-size: 26px; }
    .vsub__line { grid-column: 1 / -1; height: 2px; background: var(--qtext); opacity: .55; margin: 3px 0; }
    .vsub .dblank { min-width: 42px; height: 42px; font-family: var(--font-sans); margin: 0; }

    @media (max-width: 900px) { .opts-row .opt { min-width: 44%; } }
    /* 아주 좁아져 양옆에 닿을 때만 프로그레스 줄바꿈 */
    /* 좌우에 닿을 때만 유지 — 임의 줄바꿈 없이 일렬 유지(높이 낭비 방지) */
  </style>
</head>
<body class="learn-body">
  <div class="screen">
    <div class="screen__bg"></div>

    <div class="screen__container">
      <header class="lheader">
        <nav class="breadcrumb">
          <span class="crumb crumb--strong">수학 초등 4-1</span>
          <svg class="sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb crumb--strong crumb--clip crumb--hide">3단원 곱셈과 나눗셈</span>
          <svg class="sep crumb--hide" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb crumb--hide">(2) 세 자리 수의 뺄셈</span>
          <svg class="sep crumb--hide" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb">개념 훈련</span>
          <svg class="sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb crumb--strong">개념 다지기</span>
        </nav>
        <div class="lheader__actions">
          <button class="theme-toggle" id="themeToggle" title="라이트/다크 전환"><span class="theme-toggle__knob"></span></button>
          <button class="nav-ico" title="알림"><img src="assets/figma/icons/ico-siren.svg" alt="알림" /></button>
          <button class="nav-ico" title="나가기"><img src="assets/figma/icons/ico-exit.svg" alt="나가기" /></button>
        </div>
      </header>

      <main class="content">
        <!-- 문제 카드 (프레임 상단에 붙음 · 번호탭 헤더 + 접이식) -->
        <section class="problem is-collapsible" id="problem">
          <div class="problem__head" id="problemHead" role="button" tabindex="0" aria-label="문제 펼치기/접기">
            <span class="qtabs" id="qtabs"></span>
            <svg class="problem__chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="problem__body" id="problemBody"></div>
        </section>
        <div class="ops-wrap">
          <div class="ops" id="opsScroll">
            <div class="q" id="q"></div>
          </div>
        </div>
        <div class="ops__foot">
          <button class="btn-grade" id="gradeBtn" disabled>채점하기</button>
        </div>
      </main>
    </div>

    <!-- 계산기 키패드 (주관식) -->
    <div class="keypad" id="keypad" role="dialog" aria-label="숫자 입력">
      <div class="keypad__display">0</div>
      <div class="keypad__grid">
        <button class="kp-key" data-k="7">7</button>
        <button class="kp-key" data-k="8">8</button>
        <button class="kp-key" data-k="9">9</button>
        <button class="kp-key kp-key--op" data-k="back">⌫</button>
        <button class="kp-key" data-k="4">4</button>
        <button class="kp-key" data-k="5">5</button>
        <button class="kp-key" data-k="6">6</button>
        <button class="kp-key kp-key--op" data-k="+">+</button>
        <button class="kp-key" data-k="1">1</button>
        <button class="kp-key" data-k="2">2</button>
        <button class="kp-key" data-k="3">3</button>
        <button class="kp-key kp-key--op" data-k="-">−</button>
        <button class="kp-key" data-k="0">0</button>
        <button class="kp-key" data-k=".">.</button>
        <button class="kp-key kp-key--op" data-k="clear">↻</button>
        <button class="kp-key kp-ok" data-k="ok">확인</button>
      </div>
    </div>

    <!-- 하단 콘솔 바 -->
    <div class="bar">
      <img class="bar__deco bar__deco--l" src="assets/figma/console-right.svg" alt="" />
      <div class="bar__mid">
        <div class="bar__tray">
          <div class="bar__group">
            <button class="toolbtn"><img src="assets/figma/icons/ico-note.svg" alt="" /><span>연습장</span></button>
          </div>
          <div class="bar__group">
            <button class="toolbtn toolbtn--primary" id="nextStepBtn" disabled title="마지막 문제까지 풀면 활성화돼요"><img src="assets/figma/icons/ico-summary.svg" alt="" /><span>다음으로</span></button>
          </div>
        </div>
      </div>
      <img class="bar__deco bar__deco--r" src="assets/figma/console-left.svg" alt="" />
    </div>
  </div>

  <script src="scripts/learn-drill.js?v=5"></script>
</body>
