<!DOCTYPE html>
<html lang="ko" data-section="util">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월간보고서 — 리딩수학과학</title>
  <link rel="stylesheet" href="styles/tokens.css?v=18" />
  <link rel="stylesheet" href="styles/base.css?v=4" />
  <link rel="stylesheet" href="styles/gnb.css?v=4" />
  <link rel="stylesheet" href="styles/util.css?v=5" />
  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; }
  </style>
</head>
<body class="u-body">
  <div class="u-app">
    <header class="gnb">
      <div class="gnb__info"><span class="gnb__logo"></span><span class="gnb__name">김학생</span></div>
      <div class="gnb__icons">
        <button class="gnb__ico" title="도움말"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.3c-.8.4-1 .9-1 1.7" stroke-linecap="round"/><circle cx="12" cy="16.5" r="1" fill="currentColor" stroke="none"/></svg></button>
        <button class="gnb__ico" title="오류 신고"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17h.01"/></svg></button>
        <button class="gnb__ico" id="noticeBtn" title="공지사항"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M4 9v6h3l7 4V5L7 9H4zM18 8a5 5 0 0 1 0 8"/></svg><span class="gnb__dot"></span></button>
        <button class="gnb__ico" id="menuBtn" title="메뉴"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
      </div>
    </header>

    <main class="u-main">
      <div class="u-wrap">
        <div class="u-head">
          <div class="u-head__l">
            <span class="u-head__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1"/><path d="M8 14v3M12 10v7M16 12v5"/></svg></span>
            <div>
              <div class="u-head__t">월간보고서</div>
              <div class="u-head__sub">매달 학습 현황과 성취를 정리한 리포트를 확인하세요. 리포트는 새 창에서 열립니다.</div>
            </div>
          </div>
        </div>

        <div class="u-card">
          <div class="u-tablewrap">
            <table class="u-table">
              <thead><tr>
                <th class="col-no is-center">번호</th>
                <th>제목</th>
                <th>학습 기간</th>
                <th class="col-date is-right">등록일</th>
              </tr></thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </div>
        <div class="u-pager" id="pager"></div>
      </div>
    </main>
  </div>

  <div class="u-toast" id="toast"></div>

  <script>
  (function(){
    var DATA=[
      { id:5, term:'2026.06.01 ~ 2026.06.30', reg:'2026.07.01', isNew:true },
      { id:4, term:'2026.05.01 ~ 2026.05.31', reg:'2026.06.01' },
      { id:3, term:'2026.04.01 ~ 2026.04.30', reg:'2026.05.01' },
      { id:2, term:'2026.03.01 ~ 2026.03.31', reg:'2026.04.01' },
      { id:1, term:'2026.02.01 ~ 2026.02.28', reg:'2026.03.01' }
    ];
    var EXT='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5h5v5M19 5l-8 8M18 14v4a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h4"/></svg>';
    var tb=document.getElementById('rows');
    DATA.forEach(function(d){
      var tr=document.createElement('tr');
      tr.innerHTML='<td class="col-no is-center">'+d.id+'</td>'
        +'<td><span class="u-ttl">'+d.term.slice(0,7).replace(".","년 ")+'월 학습 리포트</span>'+(d.isNew?'<span class="u-new">N</span>':'')+'<span class="u-open">'+EXT+'새 창에서 열기</span></td>'
        +'<td style="color:var(--ink-2);font-weight:600;font-variant-numeric:tabular-nums">'+d.term+'</td>'
        +'<td class="col-date is-right">'+d.reg+'</td>';
      tr.addEventListener('click', function(){ toast('월간보고서는 새 창에서 열립니다. (리포트 연동 예정)'); });
      tb.appendChild(tr);
    });
    var p=document.getElementById('pager');
    var b=document.createElement('button'); b.textContent='1'; b.className='is-on'; p.appendChild(b);

    var toastEl=document.getElementById('toast'), tt;
    function toast(m){ toastEl.textContent=m; toastEl.classList.add('show'); clearTimeout(tt); tt=setTimeout(function(){toastEl.classList.remove('show');},1900); }
  })();
  </script>
  <script src="scripts/gnb-drawer.js?v=6"></script>
</body>
</html>
