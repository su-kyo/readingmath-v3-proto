<!DOCTYPE html>
<html lang="ko" data-theme="light" data-section="assign">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과제 해설 — 리딩수학과학</title>
  <script>try{if(localStorage.getItem('rm-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
  <link rel="stylesheet" href="styles/tokens.css?v=15" />
  <style>
    /* =========================================================================
       과제 센터 · 해설 화면 (assignment-explain) — 풀이 화면의 리뷰(정답 공개) 버전
       · 보기 정오답 표시(정답 초록 / 오답선택 빨강✕) + 해설 박스
       · 우측 "정답 N/15" + OMR 초록·빨강 그리드(현재=노랑테) · 하단 결과 보기
       ========================================================================= */
    :root {
      --hd: var(--th-static); --blue: var(--th-accent); --yellow: var(--current);
      --good: var(--ok-ink); --bad: var(--no-solid);
      /* 라이트 표면 — content 거터(살짝틴트) → qpanel 흰색 / omr 살짝틴트 */
      --content: var(--n-100); --qpanel: var(--n-000); --panel: var(--n-050); --ink: var(--n-650); --sub: var(--text-muted);
      --line: var(--n-200); --opt: var(--n-000); --track: var(--n-100); --dash: var(--n-200);
    }
    :root[data-theme="dark"] {
      /* 다크 표면 — 뉴트럴 램프 단조증가(bg n-900 < 패널 n-800 < 카드 n-600)로 대비 확보 */
      --content: var(--n-900); --qpanel: var(--n-800); --panel: var(--n-800); --ink: var(--n-050); --sub: var(--text-muted);
      --line: var(--border-strong); --opt: var(--n-600); --track: var(--n-900); --dash: var(--n-500);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { font-family: var(--font-sans); background: var(--assign-body); overflow: hidden; -webkit-font-smoothing: antialiased; }

    .screen { position: relative; width: 100%; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .screen__bg { position: absolute; inset: 0; z-index: 0; background: url("assets/figma/bg-spaceship-task.png") center/cover no-repeat; }
    :root[data-theme="dark"] .screen__bg::after { content: ""; position: absolute; inset: 0; background: rgba(4,10,30,.45); }
    .wrap { position: relative; z-index: 1; flex: 1; min-height: 0; display: flex; flex-direction: column; padding: clamp(16px,2.4vw,30px) clamp(20px,5vw,72px) 0; gap: 14px; }

    /* 헤더 */
    .hd { flex: none; display: flex; align-items: center; justify-content: space-between; gap: 16px; background: var(--hd); border-radius: 30px; padding: 9px 12px 9px 28px; color: var(--n-000); }
    .bc { display: flex; align-items: center; gap: 8px; min-width: 0; font-size: 14px; }
    .bc__strong { font-weight: 800; letter-spacing: -.02em; white-space: nowrap; }
    .bc__t { opacity: .92; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bc__sep { opacity: .5; flex: none; }
    .hd__acts { display: flex; align-items: center; gap: 8px; flex: none; }
    .toggle { width: 62px; height: 32px; border-radius: 999px; background: rgba(0,0,0,.28); border: 0; position: relative; cursor: pointer; padding: 0; }
    .toggle__k { position: absolute; top: 2px; left: 2px; width: 28px; height: 28px; border-radius: 50%; background: center/contain no-repeat url("assets/figma/icons/ico-sun.svg"); transition: left .2s ease; }
    :root[data-theme="dark"] .toggle__k { left: 32px; background-image: url("assets/figma/icons/ico-moon.svg"); }
    .hd__ico { width: 34px; height: 34px; border: 0; border-radius: 11px; background: rgba(255,255,255,.14); color: var(--n-000); display: grid; place-items: center; cursor: pointer; transition: .14s; }
    .hd__ico:hover { background: rgba(255,255,255,.26); }
    .hd__ico svg { width: 19px; height: 19px; }

    /* 콘텐츠 (2단) */
    /* 프레임 테두리 = 헤더색(정적) · 다크·라이트 불변 */
    .content { flex: 1; min-height: 0; display: flex; gap: 14px; background: var(--content); border: 6px solid var(--th-static); border-bottom: 0; border-radius: 34px 34px 0 0; padding: 8px 8px 0; }
    .qpanel { background: var(--qpanel); border-radius: 30px 30px 0 0; }
    .omr { background: var(--panel); border-radius: 30px 30px 0 0; }
    .qpanel { flex: 1; min-width: 0; overflow-y: auto; padding: 26px 30px 120px; display: flex; flex-direction: column; gap: 16px; }
    .omr { width: 348px; flex: none; display: flex; flex-direction: column; gap: 16px; padding: 22px 22px 120px; }

    /* 문제 메타 */
    .qmeta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .qmeta__n { padding: 4px 10px; border-radius: 8px; background: var(--hd); color: var(--n-000); font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .qmeta__type { font-size: 15px; font-weight: 700; color: var(--hd); }
    :root[data-theme="dark"] .qmeta__type { color: var(--th-accent-hi); }
    .lvl { padding: 3px 10px; border-radius: 999px; font-size: 12.5px; font-weight: 800; margin-left: auto; }
    .lvl--기본 { background: var(--info-tint); color: var(--info-ink); }
    .lvl--실력 { background: var(--th-tint); color: var(--th-ink-accent); }
    .lvl--심화 { background: var(--warn-tint); color: var(--warn-ink); }
    .qtext { font-size: clamp(17px,1.5vw,20px); font-weight: 700; line-height: 1.65; letter-spacing: -.02em; color: var(--ink); }
    .qimg { align-self: center; padding: 14px; border-radius: 16px; background: var(--opt); border: 1px solid var(--line); }
    .qimg svg { display: block; width: 320px; height: 214px; max-width: 100%; }

    /* 객관식 (리뷰: 정오답 표시, 비활성) */
    .opts { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .opts--col { grid-template-columns: 1fr; }
    .opt { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1.5px solid var(--line); border-radius: 14px; background: var(--opt); text-align: left; }
    .opt__n { width: 26px; height: 26px; flex: none; border-radius: 50%; border: 1.6px solid var(--dash); color: var(--sub); display: grid; place-items: center; font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .opt__n svg { width: 13px; height: 13px; }
    .opt__t { font-size: 16px; font-weight: 600; color: var(--ink); }
    .opt--correct { border-color: var(--good); background: var(--ok-tint); }
    .opt--correct .opt__n { border-color: var(--good); background: var(--ok-solid); color: var(--n-000); }
    .opt--wrong { border-color: var(--bad); background: var(--no-tint); }
    .opt--wrong .opt__n { border-color: var(--bad); background: var(--bad); color: var(--n-000); }

    /* 주관식 (리뷰) */
    .short { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    .short__field { display: inline-flex; align-items: center; gap: 8px; min-width: 220px; justify-content: center; padding: 12px 24px; border: 2px solid var(--line); border-radius: 14px; background: var(--opt); }
    .short__field.is-correct { border-color: var(--good); background: var(--ok-tint); }
    .short__field.is-wrong { border-color: var(--bad); background: var(--no-tint); }
    .short__val { font-family: var(--font-mono); font-size: 22px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
    .short__unit { font-size: 16px; font-weight: 700; color: var(--sub); }
    .short__mark { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; color: var(--n-000); }
    .short__mark svg { width: 12px; height: 12px; }
    .short__mark.o { background: var(--ok-solid); } .short__mark.x { background: var(--bad); }
    .short__ans { font-size: 14px; color: var(--sub); font-weight: 600; }
    .short__ans b { color: var(--good); font-family: var(--font-mono); }

    /* 해설 박스 */
    .expl { background: var(--th-tint); border-radius: 12px; padding: 16px 18px; display: flex; flex-direction: column; gap: 6px; }
    :root[data-theme="dark"] .expl { background: var(--th-tint-strong); }
    .expl__t { font-size: 15px; font-weight: 800; color: var(--blue); }
    :root[data-theme="dark"] .expl__t { color: var(--th-accent-hi); }
    .expl__b { font-size: 15px; line-height: 1.7; color: var(--ink); }

    /* OMR 사이드바 (리뷰) */
    .omr__prog { display: flex; flex-direction: column; gap: 8px; }
    .omr__ptop { display: flex; align-items: center; justify-content: space-between; }
    .omr__ptop b { font-size: 16px; font-weight: 700; color: var(--ink); }
    .omr__ptop span { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--good); font-variant-numeric: tabular-nums; }
    .omr__track { height: 12px; border-radius: 999px; background: var(--track); padding: 2px; }
    .omr__track > i { display: block; height: 100%; border-radius: 999px; background: var(--ok-solid); }
    .omr__grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .cell { aspect-ratio: 1; border: 0; border-radius: 10px; font-family: var(--font-mono); font-size: 19px; font-weight: 700; color: var(--n-000); cursor: pointer; font-variant-numeric: tabular-nums; display: grid; place-items: center; position: relative; transition: transform .1s; }
    .cell:hover { transform: translateY(-1px); }
    .cell--correct { background: var(--ok-solid); }
    .cell--wrong { background: var(--bad); }
    .cell.is-cur { border: 3px solid var(--current); }
    .cell__mark { position: absolute; top: 3px; right: 3px; width: 16px; height: 16px; border-radius: 50%; background: var(--n-000); display: grid; place-items: center; box-shadow: 0 1px 2px rgba(0,0,0,.25); }
    .cell__mark svg { width: 10px; height: 10px; }
    .cell--correct .cell__mark { color: var(--good); }
    .cell--wrong .cell__mark { color: var(--bad); }

    /* 하단 콘솔 바 */
    .bar { position: absolute; left: 0; right: 0; bottom: 0; z-index: 40; display: flex; align-items: flex-end; height: 99px; pointer-events: none; }
    .bar__deco { width: 262px; height: 99px; flex: none; }
    .bar__deco--l { margin-right: -1px; } .bar__deco--r { margin-left: -1px; }
    .bar__mid { flex: 1; height: 75px; background: var(--n-100); padding-top: 11px; align-self: flex-end; pointer-events: auto; }
    .bar__tray { height: 64px; background: var(--n-100); display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 clamp(16px,3vw,30px); }
    .bar__group { display: flex; gap: 12px; align-items: center; }
    .tbtn { display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; padding: 9px 18px; border: 0; border-radius: 16px; background: var(--n-500); color: var(--n-000); font-family: inherit; font-weight: 700; font-size: 15px; cursor: pointer; box-shadow: 0 4px 0 var(--n-650); transition: filter .12s, transform .06s, box-shadow .06s; }
    .tbtn:hover { filter: brightness(1.1); }
    .tbtn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--n-650); }
    .tbtn svg { width: 18px; height: 18px; }
    .tbtn:disabled { opacity: .38; cursor: not-allowed; filter: none; transform: none; box-shadow: 0 4px 0 var(--n-650); }
    .tbtn--primary { background: var(--primary); box-shadow: 0 4px 0 var(--primary-pressed); }
    .tbtn--primary:hover { background: var(--primary-hover); }

    .toast { position: fixed; left: 50%; bottom: 120px; transform: translateX(-50%) translateY(10px); z-index: 50; background: var(--n-650); color: var(--n-000); font-size: 14px; font-weight: 600; padding: 12px 20px; border-radius: 12px; box-shadow: 0 10px 30px -10px rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; }
    .toast.is-on { opacity: 1; transform: translateX(-50%) translateY(0); }

    .qpanel::-webkit-scrollbar { width: 10px; }
    .qpanel::-webkit-scrollbar-thumb { background: var(--n-200); border-radius: 999px; border: 3px solid var(--qpanel); background-clip: padding-box; }
    :root[data-theme="dark"] .qpanel::-webkit-scrollbar-thumb { background: var(--n-500); background-clip: padding-box; }
    :focus-visible { outline: 3px solid var(--yellow); outline-offset: 2px; }

    @media (max-width: 900px) {
      .bar__deco { display: none; }
      .content { flex-direction: column; }
      .omr { width: auto; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="screen__bg"></div>
    <div class="wrap">
      <header class="hd">
        <nav class="bc">
          <span class="bc__strong">수학 중등 1-1</span>
          <svg class="bc__sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="bc__strong">2단원 <span style="font-weight:500">일차부등식과 연립방정식</span></span>
          <svg class="bc__sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="bc__t">일차부등식의 활용 실생활 문장제 극복 훈련</span>
        </nav>
        <div class="hd__acts">
          <button class="toggle" id="themeToggle" title="라이트/다크 전환"><span class="toggle__k"></span></button>
          <button class="hd__ico" title="알림"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 20h12M8 20v-5a4 4 0 0 1 8 0v5M12 4v2M5 8l1.5 1.5M19 8l-1.5 1.5"/></svg></button>
          <button class="hd__ico" title="나가기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg></button>
        </div>
      </header>

      <main class="content">
        <section class="qpanel" id="qpanel"></section>
        <aside class="omr">
          <div class="omr__prog">
            <div class="omr__ptop"><b>정답</b><span id="progText">0/15</span></div>
            <div class="omr__track"><i id="progBar" style="width:0%"></i></div>
          </div>
          <div class="omr__grid" id="omrGrid"></div>
        </aside>
      </main>
    </div>

    <div class="bar">
      <img class="bar__deco bar__deco--l" src="assets/figma/console-task-right.svg" alt="" />
      <div class="bar__mid">
        <div class="bar__tray">
          <div class="bar__group">
            <button class="tbtn" id="scratchBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>연습장</button>
            <button class="tbtn" id="prevBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>이전</button>
          </div>
          <div class="bar__group">
            <button class="tbtn" id="nextBtn">다음<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>
            <button class="tbtn tbtn--primary" id="resultBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17V9M15 17v-5M3 21h18M4 21V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v15"/></svg>결과 보기</button>
          </div>
        </div>
      </div>
      <img class="bar__deco bar__deco--r" src="assets/figma/console-task-left.svg" alt="" />
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script src="scripts/assignment-explain.js"></script>
</body>
</html>
