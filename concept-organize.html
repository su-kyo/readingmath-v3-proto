<!DOCTYPE html>
<html lang="ko" data-section="concept" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개념 정리하기 · 개념 훈련 — 리딩수학과학</title>
  <link rel="stylesheet" href="styles/tokens.css?v=18" />
  <link rel="stylesheet" href="styles/base.css?v=4" />
  <link rel="stylesheet" href="styles/components.css?v=5" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap");

    /* ===== 무대 (learn-concept 재사용) ===== */
    html, body { height: 100%; }
    body.learn-body { background: var(--bg); overflow: hidden; }
    .screen { position: relative; width: 100%; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .screen__bg { position: absolute; inset: 0; background: url("assets/figma/bg-spaceship-light.png") center/cover no-repeat; }
    .screen__container { position: relative; z-index: 1; flex: 1; min-height: 0; display: flex; flex-direction: column; padding: clamp(16px, 2.5vw, 32px) clamp(20px, 6vw, 80px) 0; gap: 16px; }

    /* 헤더 */
    .lheader { display: flex; align-items: center; justify-content: space-between; gap: 16px; background: var(--th-static); border-radius: 32px; padding: 8px 12px 8px 32px; color: var(--n-000); flex: none; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: clamp(13px, 1.1vw, 15px); min-width: 0; overflow: hidden; }
    .breadcrumb .sep { opacity: .45; flex: none; color: var(--n-000); }
    .breadcrumb .crumb { opacity: .72; font-weight: 500; white-space: nowrap; }
    .breadcrumb .crumb--strong { opacity: 1; font-weight: 700; }
    .breadcrumb .crumb--clip { overflow: hidden; text-overflow: ellipsis; }
    .lheader__actions { display: flex; align-items: center; gap: 8px; flex: none; }
    .theme-toggle { width: 64px; height: 34px; border-radius: 999px; background: rgba(0,0,0,.3); position: relative; flex: none; }
    .theme-toggle__knob { position: absolute; top: 2px; left: 2px; width: 30px; height: 30px; background: center / contain no-repeat url("assets/figma/icons/ico-sun.svg"); transition: left .2s ease; }
    :root[data-theme="dark"] .theme-toggle__knob { left: 32px; background-image: url("assets/figma/icons/ico-moon.svg"); }
    .nav-ico { width: 32px; height: 32px; border-radius: 12px; background: rgba(255,255,255,.14); display: inline-flex; align-items: center; justify-content: center; }
    .nav-ico img { width: 20px; height: 20px; }
    .nav-ico:hover { background: rgba(255,255,255,.26); }

    /* 콘텐츠 패널 (다크 시 이 패널 안만 어두워짐) */
    .content { flex: 1; min-height: 0; background: var(--th-panel); border: 8px solid var(--th-static); border-bottom: none; border-radius: 40px 40px 0 0; padding: clamp(16px, 2.4vw, 26px) 0 0; display: flex; flex-direction: column; overflow: hidden; }
    :root[data-theme="dark"] .content { background: var(--surface-1); border-color: var(--th-static); }

    /* ===== 지문 진행 표식 (슬림 · 도트+라벨) ===== */
    .pstep { display: flex; align-items: center; justify-content: center; gap: 10px; flex: none; font-family: var(--font-sans);
      padding: 0 clamp(24px,5vw,64px) clamp(12px,1.5vw,18px); }
    .pstep__item { display: inline-flex; align-items: center; gap: 7px; color: var(--text-muted); font-weight: 600; font-size: clamp(12px,1.1vw,14px); transition: color .2s; }
    .pstep__item .n { width: 20px; height: 20px; border-radius: 50%; box-shadow: inset 0 0 0 1.5px var(--th-accent-hi); color: var(--text-muted); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; transition: background .2s, color .2s, box-shadow .2s; }
    .pstep__item.is-done { color: var(--th-ink-accent); } .pstep__item.is-done .n { background: var(--th-accent); box-shadow: none; color: var(--n-000); }
    .pstep__item.is-current { color: var(--th-ink-accent); } .pstep__item.is-current .n { background: var(--th-accent); box-shadow: none; color: var(--n-000); }
    .pstep__bar { width: clamp(26px,5vw,56px); height: 2px; border-radius: 2px; background: color-mix(in srgb, var(--th-accent) 35%, transparent); transition: background .2s; }
    .pstep__bar.is-done { background: var(--th-accent); }
    :root[data-theme="dark"] .pstep__item { color: var(--text-muted); }
    :root[data-theme="dark"] .pstep__item .n { box-shadow: inset 0 0 0 1.5px var(--n-500); color: var(--text-muted); }
    :root[data-theme="dark"] .pstep__item.is-done { color: var(--th-accent-hi); } :root[data-theme="dark"] .pstep__item.is-done .n { background: var(--th-accent); color: var(--n-000); }
    :root[data-theme="dark"] .pstep__item.is-current { color: var(--th-accent-hi); } :root[data-theme="dark"] .pstep__item.is-current .n { background: var(--th-accent); color: var(--n-000); }
    :root[data-theme="dark"] .pstep__bar { background: var(--n-500); } :root[data-theme="dark"] .pstep__bar.is-done { background: var(--th-accent); }

    .content__inner { flex: 1; display: flex; gap: clamp(22px, 3.4vw, 42px); padding: 0 clamp(24px, 5vw, 64px) clamp(90px,10vh,110px); min-height: 0; }

    /* ===== 지문 (정독 · 인터랙션 없음) ===== */
    .article { flex: 1; color: var(--n-600); min-width: 0; overflow: auto; padding-bottom: 24px;
      font-family: "Noto Serif KR", serif; font-size: clamp(16px, 1.5vw, 20px); line-height: 1.95; letter-spacing: -0.03em; word-break: keep-all; }
    .article .para { margin: 0 0 clamp(16px, 2vw, 26px); }
    .article .para:last-child { margin-bottom: 0; }
    .seg { border-radius: 0; }
    /* 핵심 문장 = 정적 밑줄 강조 (클릭 없음) */
    .seg--key { color: var(--th-ink-accent); font-weight: 600; border-bottom: 2px solid var(--th-accent-hi); }
    /* 이미지 보유 용어 = 정적 점선 밑줄 (클릭 없음) */
    .seg--img { text-decoration: underline dotted var(--text-muted); text-underline-offset: 5px; text-decoration-thickness: 2px; }
    :root[data-theme="dark"] .article { color: var(--text); }
    :root[data-theme="dark"] .seg--key { color: var(--th-accent-hi); border-bottom-color: var(--th-ink-accent); }
    :root[data-theme="dark"] .seg--img { text-decoration-color: var(--text-muted); }

    /* ===== 개념 요약 노트 (우측 · 레이아웃 통합, 모달 아님) ===== */
    .note { width: clamp(288px, 33vw, 408px); flex: none; align-self: stretch; overflow: auto;
      background: var(--surface-1); border-radius: 22px; box-shadow: inset 0 0 0 1.5px var(--th-tint), 0 8px 24px -16px rgba(16,32,72,.4);
      padding: clamp(18px,2vw,24px); display: flex; flex-direction: column; gap: 14px; }
    /* 읽기 배경이 흰색이라 노트는 살짝 틴트 카드로 분리 (흰 위 흰색 방지) */
    :root[data-theme="light"] .note { background: var(--n-050); box-shadow: inset 0 0 0 1.5px var(--n-100), 0 10px 26px -18px rgba(16,32,72,.5); }
    .note__title { display: inline-flex; align-items: center; gap: 9px; font-family: var(--font-sans); font-weight: 800; font-size: clamp(15px,1.5vw,17px); color: var(--n-600); flex: none; }
    .note__title .ico { width: 26px; height: 26px; border-radius: 9px; background: var(--th-accent); color: var(--n-000); display: inline-flex; align-items: center; justify-content: center; flex: none; }
    .note__title .ico svg { width: 15px; height: 15px; }
    .note__divider { height: 1px; background: var(--th-tint); flex: none; }
    .note__hint { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center;
      color: var(--text-muted); font-family: var(--font-sans); font-size: 14px; line-height: 1.6; padding: 18px 12px; }
    .note__hint .big { width: 54px; height: 54px; border-radius: 16px; background: var(--th-tint); color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
    .note__hint .big svg { width: 26px; height: 26px; }
    .note__cta { display: inline-flex; align-items: center; gap: 8px; margin-top: 4px; padding: 12px 22px; border-radius: 14px;
      background: var(--th-accent); color: var(--n-000); font-family: var(--font-sans); font-weight: 800; font-size: 15px;
      box-shadow: 0 4px 0 var(--th-accent-strong); transition: filter var(--t-fast); }
    .note__cta svg { width: 18px; height: 18px; }
    .note__cta:hover { filter: brightness(1.06); }
    .note__cta:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--th-accent-strong); }
    .note__hint.is-off { display: none; }
    .note__body { display: none; flex-direction: column; gap: 14px; }
    .note__body.is-on { display: flex; animation: noteIn .24s ease; }
    @keyframes noteIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { .note__body.is-on { animation: none; } }
    .nline { font-family: "Noto Serif KR", serif; font-size: clamp(15px, 1.4vw, 18px); line-height: 1.95; color: var(--n-600); letter-spacing: -0.02em; }
    .nfill { display: inline-flex; align-items: center; justify-content: center; min-width: 58px; height: 28px; padding: 0 11px; margin: 0 2px; border-radius: 8px; background: var(--th-tint); color: var(--th-ink-accent); font-weight: 700; font-family: var(--font-sans); font-size: .88em; vertical-align: middle; }
    :root[data-theme="dark"] .note { background: var(--surface-1); box-shadow: inset 0 0 0 1.5px rgba(255,255,255,.08), 0 8px 24px -16px rgba(0,0,0,.6); }
    :root[data-theme="dark"] .note__title { color: var(--text); }
    :root[data-theme="dark"] .note__divider { background: var(--border-strong); }
    :root[data-theme="dark"] .note__hint { color: var(--text-muted); } :root[data-theme="dark"] .note__hint .big { background: var(--surface-2); color: var(--text-muted); }
    :root[data-theme="dark"] .nline { color: var(--text); }
    :root[data-theme="dark"] .nfill { background: color-mix(in srgb, var(--th-accent) 24%, transparent); color: var(--th-accent-hi); }

    /* ===== 라이트박스 (이미지 용어 클릭 시) ===== */
    .lightbox { position: fixed; inset: 0; z-index: 60; background: rgba(8,14,30,.74); display: none; align-items: center; justify-content: center; padding: 40px; }
    .lightbox.is-open { display: flex; }
    .lightbox__img { width: min(760px, 82vw); aspect-ratio: 4 / 3; background: var(--th-tint); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: var(--text-muted); box-shadow: 0 40px 90px rgba(0,0,0,.5); }
    .lightbox__close { position: absolute; top: 22px; right: 28px; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,.16); color: var(--n-000); font-size: 22px; display: flex; align-items: center; justify-content: center; }
    :root[data-theme="dark"] .lightbox__img { background: var(--surface-1); color: var(--text-muted); }

    /* 하단 콘솔 바 */
    .bar { position: absolute; left: 0; right: 0; bottom: 0; z-index: 2; display: flex; align-items: flex-end; height: 99px; }
    .bar__deco { width: 262px; height: 99px; flex: none; }
    .bar__deco--l { margin-right: -1px; } .bar__deco--r { margin-left: -1px; }
    .bar__mid { flex: 1; height: 75px; background: #DAE6F9; padding-top: 11px; align-self: flex-end; }   /* console-right/left SVG 상단 밴드와 세트 (seamless) */
    .bar__tray { height: 64px; background: #87AEEC; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 clamp(16px, 3vw, 32px); }   /* SVG 트레이 면색과 세트 */
    .bar__group { display: flex; gap: 12px; align-items: center; }
    .toolbtn { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; padding: 8px 16px; border-radius: 16px; background: var(--n-500); color: var(--n-000); font-weight: 700; font-size: clamp(13px, 1.1vw, 16px); box-shadow: 0 4px 0 var(--n-650); }
    .toolbtn:hover { filter: brightness(1.12); }
    .toolbtn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--n-650); }
    .toolbtn img { width: 20px; height: 20px; }
    .toolbtn:disabled { opacity: .5; filter: grayscale(.5); cursor: not-allowed; }
    .toolbtn--primary { background: var(--primary); box-shadow: 0 4px 0 var(--primary-pressed); }
    .toolbtn--primary:hover:not(:disabled) { background: var(--primary-hover); }

    /* 반응형 */
    @media (max-width: 900px) {
      .content__inner { flex-direction: column; overflow: auto; }
      .article { overflow: visible; }
      .note { width: auto; align-self: auto; }
      .bar__deco { display: none; } .bar__mid { border-radius: 20px 20px 0 0; }
    }
    @media (max-width: 680px) { .breadcrumb .crumb--hide { display: none; } }
    @media (max-width: 520px) { .toolbtn span { display: none; } .toolbtn { padding: 8px 12px; } }
  </style>
</head>
<body class="learn-body">
  <div class="screen">
    <div class="screen__bg"></div>

    <div class="screen__container">
      <header class="lheader">
        <nav class="breadcrumb">
          <span class="crumb crumb--strong">과학 중등 1-1</span>
          <svg class="sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb crumb--strong crumb--clip crumb--hide">2단원 물질의 특성</span>
          <svg class="sep crumb--hide" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb crumb--hide">(1) 물질의 성질</span>
          <svg class="sep crumb--hide" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb">개념 훈련</span>
          <svg class="sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb crumb--strong">개념 정리하기</span>
        </nav>
        <div class="lheader__actions">
          <button class="theme-toggle" id="themeToggle" title="라이트/다크 전환"><span class="theme-toggle__knob"></span></button>
          <button class="nav-ico" title="알림"><img src="assets/figma/icons/ico-siren.svg" alt="알림" /></button>
          <button class="nav-ico" title="나가기"><img src="assets/figma/icons/ico-exit.svg" alt="나가기" /></button>
        </div>
      </header>

      <main class="content">
        <div class="content__inner">
          <article class="article" id="article"><!-- JS 렌더 --></article>

          <!-- 개념 요약 노트 (레이아웃 통합) -->
          <aside class="note">
            <div class="note__title">
              <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
              <span id="noteTitle">개념 요약 노트</span>
            </div>
            <div class="note__divider"></div>
            <div class="note__hint" id="noteHint">
              <span class="big"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></span>
              <span>지문을 다 읽었다면<br /><b>요약하기</b>로 핵심을 정리해요</span>
              <button class="note__cta" id="summaryBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>요약하기</button>
            </div>
            <div class="note__body" id="noteBody"></div>
          </aside>
        </div>
      </main>
    </div>

    <!-- 하단 콘솔 바 -->
    <div class="bar">
      <img class="bar__deco bar__deco--l" src="assets/figma/console-right.svg" alt="" />
      <div class="bar__mid">
        <div class="bar__tray">
          <div class="bar__group">
            <button class="toolbtn"><img src="assets/figma/icons/ico-note.svg" alt="" /><span>연습장</span></button>
            <button class="toolbtn"><img src="assets/figma/icons/ico-text.svg" alt="" /><span>글자</span></button>
          </div>
          <div class="bar__group">
            <button class="toolbtn toolbtn--primary" id="doneBtn" disabled title="요약하기를 누르면 활성화돼요"><img src="assets/figma/icons/ico-summary.svg" alt="" /><span>개념 다지기로</span></button>
          </div>
        </div>
      </div>
      <img class="bar__deco bar__deco--r" src="assets/figma/console-left.svg" alt="" />
    </div>
  </div>

  <script src="scripts/concept-organize.js?v=2"></script>
</body>
</html>
