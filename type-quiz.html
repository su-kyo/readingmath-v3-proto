<!DOCTYPE html>
<html lang="ko" data-section="type" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유형 훈련 · 1차 유형 문제 — 리딩수학과학</title>
  <link rel="stylesheet" href="styles/tokens.css?v=17" />
  <link rel="stylesheet" href="styles/base.css?v=4" />
  <link rel="stylesheet" href="styles/components.css?v=5" />
  <link rel="stylesheet" href="styles/learn-shell.css?v=7" />
  <link rel="stylesheet" href="styles/type.css?v=4" />
  <style>
    /* ===== 유형 훈련 = 틸 테마 ===== */
    .lheader { background: var(--th-static); }
    .screen__bg { background: url("assets/figma/bg-spaceship-teal.png") center/cover no-repeat; }
    :root[data-theme="dark"] .content { background: var(--n-650); border-color: var(--th-static); }
    /* 라이트 = 쿨톤 베이스(스터디 페이퍼). 옵션/보기는 이 위에 카드로 은은히 분리 */
    :root[data-theme="light"] .content { background: var(--n-000); border-color: var(--th-static); --fade: var(--n-000); }
    .content { position: relative; flex-direction: column; padding: 0 0 96px; overflow: hidden; --fade: var(--n-050); --subj: var(--th-accent); }
    :root[data-theme="dark"] .content { --fade: var(--n-650); }

    /* 스크롤 영역 (cap 아래) + 상하 페이드 */
    .ops-wrap { flex: 1; min-height: 0; position: relative; margin-top: 40px; }
    .ops-wrap::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 48px; pointer-events: none; z-index: 1; background: linear-gradient(to top, var(--fade), transparent); opacity: 0; transition: opacity .2s ease; }
    .ops-wrap::before { content: ""; position: absolute; left: 0; right: 0; top: 0; height: 44px; pointer-events: none; z-index: 1; background: linear-gradient(to bottom, var(--fade), transparent); opacity: 0; transition: opacity .2s ease; }
    .ops-wrap.has-more::after { opacity: 1; } .ops-wrap.has-more-top::before { opacity: 1; }
    .ops {
      position: absolute; inset: 0; overflow-y: auto; display: flex; flex-direction: column; align-items: center;
      padding: 6px clamp(24px, 5vw, 56px) 26px;
      /* 다크: 패널(121E37)보다 한 단계 가라앉힌 박스(n-800)로 구분 */
      --qtext: var(--n-050); --muted: var(--text-muted); --ex-bg: var(--n-800); --opt-bg: var(--n-800); --opt-br: rgba(255,255,255,.1); --opt-hover: var(--n-600);
      --input-bg: var(--n-650); --input-br: var(--n-500);
    }
    :root[data-theme="light"] .ops { --qtext: var(--n-650); --muted: var(--text-muted); --ex-bg: var(--n-100); --opt-bg: var(--n-000); --opt-br: var(--n-100); --opt-hover: var(--n-050); --input-bg: var(--n-000); --input-br: var(--n-200); }
    .ops::-webkit-scrollbar { width: 10px; }
    .ops::-webkit-scrollbar-thumb { background: rgba(255,255,255,.24); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    :root[data-theme="light"] .ops::-webkit-scrollbar-thumb { background: rgba(20,60,52,.22); background-clip: padding-box; }

    /* ===== 상단 프로그레스 캡 (타이머 + 풀었다/미풀이) ===== */
    .progress-cap { position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 4; display: inline-flex; align-items: center; gap: 8px; background: var(--n-650); border-radius: 0 0 16px 16px; padding: 0 16px 7px; max-width: calc(100% - 48px); flex-wrap: nowrap; }
    .cap-timer { display: inline-flex; align-items: center; gap: 6px; background: var(--n-900); border-radius: 999px; padding: 4px 12px 4px 10px; margin-right: 4px; }
    .cap-timer img { width: 17px; height: 17px; }
    .cap-timer span { font-family: var(--font-mono); font-weight: 700; color: var(--n-000); font-size: 15px; }
    .pcirc { width: 20px; height: 20px; border-radius: 50%; flex: none; position: relative; background: rgba(255,255,255,.22); }
    .pcirc.is-current { background: transparent; box-shadow: inset 0 0 0 2px var(--n-000); }
    .pcirc.is-solved { background: var(--subj); }
    .pcirc.is-solved::after { content: ""; position: absolute; inset: 0; background: center / 15px no-repeat url("assets/figma/icons/ico-progress-check.svg"); }
    .pcap__count { margin-left: 4px; font-weight: 700; color: var(--n-000); font-size: 16px; font-family: var(--font-mono); }
    /* 좌우에 닿을 때만 유지 — 임의 줄바꿈 없이 일렬 유지(높이 낭비 방지) */

    /* ===== 문제 ===== */
    .q { width: min(1040px, 100%); margin: auto 0; display: flex; flex-direction: column; align-items: center; }
    .q__text { align-self: stretch; font-size: clamp(16px, 1.5vw, 20px); font-weight: 700; color: var(--qtext); line-height: 1.6; margin-bottom: 20px; }
    .ex { align-self: stretch; background: var(--ex-bg); border-radius: 18px; padding: 20px 24px; margin-bottom: 22px; }
    .ex__list { display: flex; flex-direction: column; gap: 10px; font-size: clamp(15px,1.4vw,18px); color: var(--qtext); line-height: 1.5; }
    .ex__skel { min-height: 140px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-weight: 700; }
    .ex__shape { display: flex; justify-content: center; }

    /* 객관식 */
    .opts-row { align-self: stretch; display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .opts-row .opt { flex: 1 1 0; min-width: 120px; }
    .opts-grid { align-self: stretch; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
    .opt { display: flex; align-items: center; gap: 12px; padding: 15px 20px; min-height: 60px; border-radius: 14px; background: var(--opt-bg); box-shadow: inset 0 0 0 1.5px var(--opt-br); color: var(--qtext); font-size: clamp(15px,1.35vw,17px); font-weight: 600; text-align: left; cursor: pointer; transition: background .12s, box-shadow .12s; }
    .opt:hover { background: var(--opt-hover); }
    .opt__num { flex: none; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,.14); color: var(--qtext); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; position: relative; }
    :root[data-theme="light"] .opt__num { background: var(--th-tint-strong); color: var(--th-ink-accent); }
    .opt--num { justify-content: center; } .opt--num .opt__num { width: 34px; height: 34px; }
    .opt__img { width: 100%; height: 96px; border-radius: 10px; background: var(--n-200); }
    .opt--img { flex-direction: column; align-items: stretch; gap: 10px; padding: 12px; }
    .opt.is-selected { background: var(--subj); box-shadow: none; color: var(--n-000); }
    .opt.is-selected .opt__num { background: var(--n-000); color: transparent; }
    .opt.is-selected .opt__num::after { content: "✓"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--subj); font-weight: 900; }
    /* 이미지 선지: 선택 = 채움 대신 테두리 + 번호 배지 (jpg 안 가림, 번호 항상 보임) */
    .opt--img .opt__num { align-self: center; color: var(--qtext) !important; }
    .opt--img .opt__num::after { content: none !important; }
    .opt--img.is-selected { background: var(--opt-bg); box-shadow: inset 0 0 0 3px var(--subj); color: var(--qtext); }
    .opt--img.is-selected .opt__num { background: var(--subj); color: var(--n-000) !important; }

    /* 주관식 = 박스 input + 계산기 키패드 */
    .answer-row { display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap; }
    .sfield { display: flex; align-items: center; gap: 8px; }
    .sfield__tag { font-weight: 800; color: var(--qtext); }
    .sinput { height: 54px; min-width: 200px; padding: 0 16px; text-align: center; background: var(--input-bg); border: 1.5px solid var(--input-br); border-radius: 14px; color: var(--qtext); font-size: 18px; font-weight: 700; font-family: var(--font-sans); cursor: pointer; }
    .sinput::placeholder { color: var(--muted); font-weight: 500; }
    .sinput:focus, .sinput.is-active-input { outline: none; border-color: var(--subj); }
    .fraction { display: inline-flex; flex-direction: column; align-items: center; gap: 8px; }
    .fraction .sinput { min-width: 96px; width: 96px; height: 50px; padding: 0 10px; }
    .fraction__bar { width: 104px; height: 3px; background: var(--qtext); border-radius: 2px; }

    /* ===== 다음 문제 (중앙) ===== */
    .ops__foot { flex: none; display: flex; justify-content: center; padding: 10px 0 4px; }
    .btn-next { padding: 14px 44px; border-radius: 16px; background: var(--subj); color: var(--n-000); font-weight: 800; font-size: 18px; box-shadow: 0 4px 0 var(--th-accent-strong); }
    .btn-next:hover:not(:disabled) { filter: brightness(1.08); } .btn-next:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 var(--th-accent-strong); }
    .btn-next:disabled { background: var(--n-500); color: var(--text-muted); box-shadow: none; cursor: not-allowed; }
    .btn-next[hidden] { display: none; }

    /* 하단바 = 유형 버전 (크림/베이지 트레이 + 틸 콘솔 데코) */
    .bar__mid { background: var(--amber-050); }
    .bar__tray { background: #ECE3D8; }  /* §3.5 console-type 트레이 에셋색 */
    .toolbtn:disabled { opacity: .5; filter: grayscale(.5); cursor: not-allowed; }

    /* ===== 계산기 키패드 (유형=틸) ===== */
    .keypad { position: fixed; z-index: 45; width: 244px; padding: 12px; background: var(--n-100); border-radius: 22px; border: 1.5px solid var(--n-200); box-shadow: 0 24px 55px rgba(10,24,60,.42), inset 0 0 0 3.5px var(--n-050); opacity: 0; visibility: hidden; translate: 0 6px; transition: opacity .14s, translate .14s, visibility .14s; --kp-accent: var(--th-accent); }
    .keypad.is-open { opacity: 1; visibility: visible; translate: 0 0; }
    .keypad__display { height: 50px; border-radius: 12px; background: var(--n-700); color: var(--th-accent-hi); display: flex; align-items: center; justify-content: flex-end; padding: 0 16px; font-size: 24px; font-weight: 700; font-family: var(--font-mono); margin-bottom: 10px; }
    .keypad__grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .kp-key { height: 46px; border-radius: 12px; background: var(--n-000); color: var(--n-600); font-weight: 700; font-size: 18px; font-family: var(--font-sans); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 3px rgba(20,40,90,.1); }
    .kp-key:hover { background: var(--n-050); } .kp-key:active { transform: translateY(1px); box-shadow: none; }
    .kp-key--op { color: var(--kp-accent); font-size: 20px; }
    .kp-key[data-k="0"] { grid-column: span 2; }
    .kp-ok { grid-column: span 4; height: 48px; background: var(--kp-accent); color: var(--n-000); font-weight: 800; font-size: 18px; box-shadow: none; }
    .kp-ok:hover { background: var(--kp-accent); filter: brightness(1.08); }

    @media (max-width: 900px) { .opts-row .opt { min-width: 44%; } }
  </style>
</head>
<body class="learn-body">
  <div class="screen">
    <div class="screen__bg"></div>

    <div class="screen__container">
      <header class="lheader">
        <nav class="breadcrumb">
          <span class="crumb crumb--strong">과학 중등 1-1</span>
          <svg class="sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb crumb--strong crumb--clip crumb--hide">2단원 생물의 구성과 다양성</span>
          <svg class="sep crumb--hide" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb crumb--hide">(1) 생물의 구성</span>
          <svg class="sep crumb--hide" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb">유형 훈련</span>
          <svg class="sep" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          <span class="crumb crumb--strong">1차 유형 문제</span>
        </nav>
        <div class="lheader__actions">
          <div class="lheader__timer" id="hdrTimer"><img src="assets/figma/icons/ico-stopwatch.svg" alt="경과 시간" /><span id="timer">00:00</span></div>
          <button class="theme-toggle" id="themeToggle" title="라이트/다크 전환"><span class="theme-toggle__knob"></span></button>
          <button class="nav-ico" title="알림"><img src="assets/figma/icons/ico-siren.svg" alt="알림" /></button>
          <button class="nav-ico" title="나가기"><img src="assets/figma/icons/ico-exit.svg" alt="나가기" /></button>
        </div>
      </header>

      <main class="content">
        <div class="progress-cap" id="progress"></div>
        <div class="ops-wrap">
          <div class="ops" id="opsScroll"><div class="q" id="q"></div></div>
        </div>
        <div class="ops__foot">
          <button class="btn-next" id="nextBtn" disabled>다음 문제</button>
        </div>
      </main>
    </div>

    <!-- 계산기 키패드 -->
    <div class="keypad" id="keypad" role="dialog" aria-label="숫자 입력">
      <div class="keypad__display">0</div>
      <div class="keypad__grid">
        <button class="kp-key" data-k="7">7</button><button class="kp-key" data-k="8">8</button><button class="kp-key" data-k="9">9</button><button class="kp-key kp-key--op" data-k="back">⌫</button>
        <button class="kp-key" data-k="4">4</button><button class="kp-key" data-k="5">5</button><button class="kp-key" data-k="6">6</button><button class="kp-key kp-key--op" data-k="+">+</button>
        <button class="kp-key" data-k="1">1</button><button class="kp-key" data-k="2">2</button><button class="kp-key" data-k="3">3</button><button class="kp-key kp-key--op" data-k="-">−</button>
        <button class="kp-key" data-k="0">0</button><button class="kp-key" data-k=".">.</button><button class="kp-key kp-key--op" data-k="clear">↻</button>
        <button class="kp-key kp-ok" data-k="ok">확인</button>
      </div>
    </div>

    <!-- 하단 콘솔 바 -->
    <div class="bar">
      <img class="bar__deco bar__deco--l" src="assets/figma/console-type-right.svg" alt="" />
      <div class="bar__mid">
        <div class="bar__tray">
          <div class="bar__group">
            <button class="toolbtn"><img src="assets/figma/icons/ico-note.svg" alt="" /><span>연습장</span></button>
          </div>
          <div class="bar__group">
            <button class="toolbtn toolbtn--primary" id="submitBtn" disabled title="모든 문제를 풀면 활성화돼요"><img src="assets/figma/icons/ico-summary.svg" alt="" /><span>제출하기</span></button>
          </div>
        </div>
      </div>
      <img class="bar__deco bar__deco--r" src="assets/figma/console-type-left.svg" alt="" />
    </div>
  </div>

  <script src="scripts/type-quiz.js?v=5"></script>
</body>
</html>
